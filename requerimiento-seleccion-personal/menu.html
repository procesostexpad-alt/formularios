<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu de Navegacion - Formularios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    :root {
      --bg-1: #f2f6f5;
      --bg-2: #ddebe6;
      --brand: #0f5f4e;
      --brand-2: #1f8b71;
      --text: #1f2a2b;
      --muted: #5b696c;
      --panel: #ffffff;
      --line: #d7e0dc;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(31, 139, 113, 0.12), transparent 35%),
        radial-gradient(circle at 90% 0%, rgba(15, 95, 78, 0.1), transparent 40%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    .page-wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 14px 36px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 16px 32px rgba(22, 52, 44, 0.08);
      padding: 20px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: 1.6rem;
      color: var(--brand);
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .metric-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #f8fcfa;
    }

    .metric-label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
    }

    .metric-value {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--brand);
    }

    .list-wrap {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 16px 32px rgba(22, 52, 44, 0.08);
      padding: 14px;
    }

    .nav-item-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .nav-item-btn:last-child {
      margin-bottom: 0;
    }

    .nav-item-btn:hover {
      transform: translateY(-2px);
      border-color: #b8cdc6;
      box-shadow: 0 10px 24px rgba(20, 72, 59, 0.13);
    }

    .step {
      display: inline-block;
      font-size: 0.74rem;
      color: #fff;
      background: var(--brand-2);
      border-radius: 999px;
      padding: 3px 9px;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .screen-title {
      display: block;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .screen-desc {
      display: block;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 768px) {
      .metrics {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 1.35rem;
      }
    }
  </style>
  <link rel="stylesheet" href="assets/css/global-theme.css">
  <link rel="stylesheet" href="assets/css/ui-shell.css">
</head>
<body>
  <main class="page-wrap">
    <section class="hero">
      <h1>Flujo de Formularios y Trazabilidad</h1>
      <p>Selecciona una pantalla para continuar el proceso de gestion de solicitudes.</p>

      <div class="metrics">
        <article class="metric-card">
          <span class="metric-label">Solicitudes activas</span>
          <span class="metric-value" id="metricActivas">0</span>
        </article>
        <article class="metric-card">
          <span class="metric-label">Solicitudes eliminadas</span>
          <span class="metric-value" id="metricEliminadas">0</span>
        </article>
      </div>
    </section>

    <section class="list-wrap">
      <button class="nav-item-btn" onclick="navigateTo('modules/gestion/solicitudes/listado-solicitudes.html')">
        <span class="step">Paso 1</span>
        <span class="screen-title">Solicitud de Requerimiento de Personal</span>
        <span class="screen-desc">Alta, edicion, anulacion y control de solicitudes.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/postulacion/aprobacion-postulacion.html')">
        <span class="step">Paso 2</span>
        <span class="screen-title">Gestion Aprobacion Requerimiento Personal</span>
        <span class="screen-desc">Revision y aprobacion para iniciar postulacion.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/postulacion/activacion-postulacion.html')">
        <span class="step">Paso 2.1</span>
        <span class="screen-title">Activacion de Postulacion</span>
        <span class="screen-desc">Configura fechas de inicio y fin, edita y finaliza postulaciones.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/postulacion/registro-postulacion.html')">
        <span class="step">Paso 2.2</span>
        <span class="screen-title">Registro de Postulacion</span>
        <span class="screen-desc">Registro de candidatos en solicitudes con postulacion activa.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/seleccion/visualizacion-preseleccion.html')">
        <span class="step">Paso 3</span>
        <span class="screen-title">Preseleccion de Candidatos</span>
        <span class="screen-desc">Revision de candidatos y cierre de preseleccion.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/postulacion/visualizacion-solicitante.html')">
        <span class="step">Paso 4</span>
        <span class="screen-title">Seleccion Oficial</span>
        <span class="screen-desc">Decision final de candidatos oficiales.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/seleccion/lista-candidatos-aptos.html')">
        <span class="step">Paso 5</span>
        <span class="screen-title">Aprobacion de Ingreso</span>
        <span class="screen-desc">Validacion final antes del ingreso de personal.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/evaluacion/pre-ingreso.html')">
        <span class="step">Paso 6</span>
        <span class="screen-title">Pre-ingreso</span>
        <span class="screen-desc">Registro de codigo de trabajador y fecha de ingreso antes de la induccion.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/evaluacion/induccion.html')">
        <span class="step">Paso 6.1</span>
        <span class="screen-title">Induccion</span>
        <span class="screen-desc">Induccion de Talento Humano, SSOMA y Puesto de Trabajo con pre-ingreso ya registrado.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/evaluacion/entrega-dotacion.html')">
        <span class="step">Paso 7</span>
        <span class="screen-title">Entrega de Dotacion Basica</span>
        <span class="screen-desc">Registro de entrega basica para solicitudes que requieren dotacion.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/evaluacion/ver-entrega-equipos-accesos.html')">
        <span class="step">Paso 8</span>
        <span class="screen-title">Equipos y Accesos</span>
        <span class="screen-desc">Control de entrega de equipos y accesos internos.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/evaluacion/periodo-prueba.html')">
        <span class="step">Paso 9</span>
        <span class="screen-title">Periodo de Prueba</span>
        <span class="screen-desc">Se habilita cuando las entregas previas requeridas ya fueron registradas.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/evaluacion/aptitud-medica.html')">
        <span class="step">Paso 10</span>
        <span class="screen-title">Aptitud Medica</span>
        <span class="screen-desc">Registro del resultado medico de ingreso.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/evaluacion/entrega-dotacion-completa.html')">
        <span class="step">Paso 10.1</span>
        <span class="screen-title">Entrega de Dotacion Completa</span>
        <span class="screen-desc">Registro final posterior a aptitud medica aprobada, cuando aplica dotacion.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/evaluacion/ingreso-personal.html')">
        <span class="step">Paso 11</span>
        <span class="screen-title">Ingreso de Personal</span>
        <span class="screen-desc">Alta operativa de candidatos aprobados.</span>
      </button>

      <button class="nav-item-btn" onclick="navigateTo('modules/gestion/estado-general.html')">
        <span class="step">Vista</span>
        <span class="screen-title">Estado General</span>
        <span class="screen-desc">Consulta central del estado de solicitudes y candidatos.</span>
      </button>
    </section>
  </main>

  <script>
    function navigateTo(page) {
      window.location.href = page;
    }

    function cargarMetricas() {
      const activas = JSON.parse(localStorage.getItem("solicitudes") || "[]");
      const eliminadas = JSON.parse(localStorage.getItem("solicitudes_eliminadas") || "[]");

      document.getElementById("metricActivas").textContent = activas.length;
      document.getElementById("metricEliminadas").textContent = eliminadas.length;
    }

    cargarMetricas();
  </script>
  <script src="assets/js/ui-shell.js"></script>
</body>
</html>
