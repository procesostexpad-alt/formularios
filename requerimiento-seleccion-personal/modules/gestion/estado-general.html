<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estado General de Postulantes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  .solicitud-block {
    border: 1px solid #ccc;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    background: #f8f9fa;
  }

  .candidato-item {
    padding: 10px;
    border-bottom: 1px solid #ddd;
  }

  .btn-timeline {
    font-size: 14px;
    padding: 5px 12px;
  }

  .hidden {
    display: none;
  }
</style>
  <link rel="stylesheet" href="../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../assets/css/ui-shell.css">
</head>

<body class="bg-light p-4">

<div class="container">

  <h3 class="mb-4">Estado General de Postulantes</h3>

  <!-- ===========================
        SELECT DE SOLICITUDES
  ============================ -->
  <div class="mb-4">
    <label class="form-label fw-bold">Seleccione una Solicitud</label>
    <select id="selectSolicitud" class="form-select" onchange="mostrarSolicitudSeleccionada()">
      <option value="">Seleccione...</option>
    </select>
  </div>

  <!-- Contenedor donde aparecerán los candidatos -->
  <div id="contenedorSolicitudes"></div>

</div>


<script>

// ==========================================
// CARGAR LISTA DE SOLICITUDES EN EL SELECT
// ==========================================
function cargarSelectSolicitudes() {

  const select = document.getElementById("selectSolicitud");
  const solicitudes = JSON.parse(localStorage.getItem("solicitudes") || "[]");

  solicitudes.forEach((sol, index) => {

    const opt = document.createElement("option");
    opt.value = index; 
    opt.textContent = `${sol.numero} - ${sol.solicitante} - ${sol.cargoSolicitado}`;

    select.appendChild(opt);
  });
}


// ==========================================
// MOSTRAR SOLO LA SOLICITUD SELECCIONADA
// ==========================================
function mostrarSolicitudSeleccionada() {

  const cont = document.getElementById("contenedorSolicitudes");
  cont.innerHTML = "";

  const index = document.getElementById("selectSolicitud").value;
  if (index === "") return;

  const solicitudes = JSON.parse(localStorage.getItem("solicitudes") || "[]");
  const sol = solicitudes[index];

  const div = document.createElement("div");
  div.className = "solicitud-block";

  div.innerHTML = `
    <h5>Solicitud #${sol.numero}</h5>
    <p><strong>Solicitante:</strong> ${sol.solicitante}<br>
       <strong>Cargo:</strong> ${sol.cargoSolicitado}</p>

    <h6>Candidatos:</h6>
    <div id="listaC${index}"></div>
  `;

  cont.appendChild(div);

  cargarCandidatos(sol, index);
}


// ==========================================
// CARGAR CANDIDATOS DE UNA SOLICITUD
// ==========================================
function cargarCandidatos(sol, indexSol) {

  const cont = document.getElementById("listaC" + indexSol);
  cont.innerHTML = "";

  sol.candidatos.forEach(c => {

      const estadoFinal = determinarEtapaGeneral(c);

      const div = document.createElement("div");
      div.className = "candidato-item";

      div.innerHTML = `
        <div class="row">
          <div class="col-md-8">
            <strong>${c.nombre}</strong><br>
            Cédula: ${c.cedula}<br>
            <em>Estado actual:</em> <strong>${estadoFinal}</strong>
          </div>

          <div class="col-md-4 text-end">
            <button class="btn btn-primary btn-timeline"
                    onclick="verTimeline('${sol.numero}', '${c.cedula}')">
              🔎 Ver Timeline
            </button>
          </div>
        </div>
      `;

      cont.appendChild(div);
  });
}


// ==========================================
// DETERMINAR ETAPA ACTUAL DEL CANDIDATO
// ==========================================
function determinarEtapaGeneral(c) {

  if (c.periodoEstado === "EN PRUEBA") return "En Periodo de Prueba";
  if (c.periodoEstado === "CERRADO" && c.periodoAptitudFinal === "APTO") return "Aprobó Periodo de Prueba";
  if (c.periodoEstado === "CERRADO" && c.periodoAptitudFinal === "NO APTO") return "No Aprobó Periodo de Prueba";

  if (c.ingreso === "INGRESO") return "Ingreso Registrado";
  if (c.ingreso === "NO INGRESO") return "No Ingreso";

  if (c.aptitudMedica === "APTO") return "Apto Médicamente";
  if (c.aptitudMedica === "APTO CON OBSERVACIÓN") return "Apto con Observación";
  if (c.aptitudMedica === "NO APTO") return "No Apto Médicamente";

  if (c.estado === "seleccionado_oficial") return "Seleccionado Oficial";
  if (c.estado === "terna") return "Terna";
  if (c.estado === "no_seleccionado") return "No Preseleccionado";
  if (c.estado === "postulado") return "Postulado";

  return "Sin Información";
}


// ==========================================
// IR A LA PANTALLA DE LA LÍNEA DE TIEMPO
// ==========================================
function verTimeline(numeroSolicitud, cedula) {
  window.location.href = `../postulacion/timeline-postulante.html?sol=${numeroSolicitud}&ced=${cedula}`;
}


// ==========================================
document.addEventListener("DOMContentLoaded", cargarSelectSolicitudes);

</script>

  <script src="../../assets/js/ui-shell.js"></script>
</body>
</html>
