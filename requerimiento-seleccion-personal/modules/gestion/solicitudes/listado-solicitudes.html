<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1. Solicitud de Requerimiento de Personal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    :root {
      --bg-a: #edf4f2;
      --bg-b: #d6e7e1;
      --surface: #ffffff;
      --line: #d7e1de;
      --text: #1f2a2b;
      --muted: #627176;
      --brand: #0f5f4e;
      --brand-2: #1f8b71;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(31, 139, 113, 0.14), transparent 38%),
        linear-gradient(180deg, var(--bg-a), var(--bg-b));
    }

    .layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 14px 34px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 16px 32px rgba(23, 54, 45, 0.08);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .panel-title {
      margin: 0;
      color: var(--brand);
      font-size: 1.35rem;
      font-weight: 700;
    }

    .panel-subtitle {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .toolbar {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1.3fr 0.7fr auto;
      gap: 10px;
    }

    .table-wrap {
      padding: 10px 12px 16px;
      overflow-x: auto;
    }

    .table {
      margin-bottom: 0;
      font-size: 0.9rem;
    }

    .table thead th {
      white-space: nowrap;
      font-size: 0.78rem;
      letter-spacing: 0.25px;
      text-transform: uppercase;
      color: #425155;
    }

    .trace-chip {
      display: inline-block;
      background: #e6f4ee;
      color: #14634f;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 0.74rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge {
      font-size: 0.75rem;
      padding: 5px 8px;
      border-radius: 999px;
    }

    .actions {
      white-space: nowrap;
    }

    .actions .btn {
      margin-right: 6px;
      margin-bottom: 4px;
    }

    .pdf-modal {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: none;
    }

    .pdf-modal.is-open {
      display: block;
    }

    .pdf-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 24, 24, 0.65);
    }

    .pdf-modal-dialog {
      position: relative;
      z-index: 1;
      width: min(1200px, 96vw);
      height: min(92vh, 860px);
      margin: 3vh auto;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #c9d5d1;
      background: #fff;
      box-shadow: 0 28px 52px rgba(10, 26, 25, 0.38);
      display: flex;
      flex-direction: column;
    }

    .pdf-modal-head {
      padding: 10px 12px;
      border-bottom: 1px solid #d7e1de;
      background: #f2f7f5;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .pdf-modal-title {
      margin: 0;
      font-size: 0.96rem;
      color: #1b2a2a;
    }

    .pdf-modal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pdf-modal-frame {
      border: 0;
      width: 100%;
      height: 100%;
      flex: 1;
      background: #2b2f35;
    }

    .motivo-modal {
      position: fixed;
      inset: 0;
      z-index: 3200;
      display: none;
    }

    .motivo-modal.is-open {
      display: block;
    }

    .motivo-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 24, 24, 0.6);
    }

    .motivo-modal-dialog {
      position: relative;
      z-index: 1;
      width: min(620px, 94vw);
      margin: 10vh auto;
      border-radius: 14px;
      border: 1px solid #c9d5d1;
      background: #fff;
      box-shadow: 0 24px 42px rgba(10, 26, 25, 0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 76vh;
    }

    .motivo-modal-head {
      padding: 10px 12px;
      border-bottom: 1px solid #d7e1de;
      background: #f2f7f5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .motivo-modal-title {
      margin: 0;
      font-size: 0.96rem;
      color: #1b2a2a;
      font-weight: 700;
    }

    .motivo-modal-body {
      padding: 14px;
      overflow: auto;
    }

    .motivo-modal-text {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.45;
      color: #2d3a3e;
    }

    @media (max-width: 920px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .panel-title {
        font-size: 1.18rem;
      }

      .pdf-modal-dialog {
        width: 98vw;
        height: 95vh;
        margin: 2.5vh auto;
      }
    }
  </style>
  <link rel="stylesheet" href="../../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../../assets/css/ui-shell.css">
</head>
<body>
  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <div>
          <h1 class="panel-title">Solicitud de Requerimiento de Personal</h1>
          <p class="panel-subtitle">Control de solicitudes con trazabilidad de cambios y estado.</p>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary" onclick="window.location.href='../../../menu.html'">Volver al menu</button>
          <button class="btn btn-success" onclick="nuevaSolicitud()">+ Formulario de Requerimiento de Personal</button>
        </div>
      </div>

      <div class="toolbar">
        <input id="txtBuscar" class="form-control" type="text" placeholder="Buscar por numero, solicitante, cargo o estado" oninput="cargarTabla()">

        <select id="selEstado" class="form-select" onchange="cargarTabla()">
          <option value="">Todos los estados</option>
        </select>

        <button class="btn btn-outline-dark" onclick="limpiarFiltros()">Limpiar filtros</button>
      </div>

      <div class="table-wrap">
        <table class="table table-bordered table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Fecha</th>
              <th>Solicitante</th>
              <th>Area</th>
              <th>Departamento</th>
              <th>Cargo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="pdfModal" class="pdf-modal" aria-hidden="true">
    <div class="pdf-modal-backdrop" onclick="cerrarPdfModal()"></div>
    <section class="pdf-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="pdfModalTitle">
      <header class="pdf-modal-head">
        <p id="pdfModalTitle" class="pdf-modal-title">Vista previa PDF de solicitud</p>
        <div class="pdf-modal-actions">
          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="descargarPdfActual()">Descargar</button>
          <button type="button" class="btn btn-outline-dark btn-sm" onclick="abrirPdfActual()">Abrir en pestaña</button>
          <button type="button" class="btn btn-danger btn-sm" onclick="cerrarPdfModal()">Cerrar</button>
        </div>
      </header>
      <iframe id="pdfPreviewFrame" class="pdf-modal-frame" title="Vista previa PDF"></iframe>
    </section>
  </div>

  <div id="motivoRechazoModal" class="motivo-modal" aria-hidden="true">
    <div class="motivo-modal-backdrop" onclick="cerrarMotivoRechazoModal()"></div>
    <section class="motivo-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="motivoRechazoTitle">
      <header class="motivo-modal-head">
        <p id="motivoRechazoTitle" class="motivo-modal-title">Motivo de rechazo</p>
        <button type="button" class="btn btn-danger btn-sm" onclick="cerrarMotivoRechazoModal()">Cerrar</button>
      </header>
      <div class="motivo-modal-body">
        <p id="motivoRechazoTexto" class="motivo-modal-text"></p>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="../../../assets/js/gestion/gestion-solicitud.js"></script>
  <script src="../../../assets/js/ui-shell.js"></script>
</body>
</html>
