<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalle de Equipos y Accesos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  .readonly-field {
    background-color: #f8f9fa;
    border: 1px solid #dee2e6;
  }
  .section-header {
    margin-top: 25px;
    font-weight: bold;
    font-size: 18px;
    color: #444;
    border-bottom: 2px solid #ddd;
    padding-bottom: 4px;
    margin-bottom: 15px;
  }
</style>
  <link rel="stylesheet" href="../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../assets/css/ui-shell.css">
</head>

<body class="bg-light p-4">

<div class="container">

  <!-- BOTÓN PARA REGRESAR -->
  <button class="btn btn-secondary mb-4" onclick="regresar()">
    ⟵ Regresar
  </button>

  <h3 class="mb-4">Detalle de Equipos y Accesos</h3>

  <div id="contenido"></div>

</div>

<script>
// ======================================================
// FUNCIONES
// ======================================================
function calcularEdad(fechaNac) {
    if (!fechaNac) return "-";

    const nacimiento = new Date(fechaNac);
    const hoy = new Date();

    let edad = hoy.getFullYear() - nacimiento.getFullYear();
    const m = hoy.getMonth() - nacimiento.getMonth();

    if (m < 0 || (m === 0 && hoy.getDate() < nacimiento.getDate())) {
        edad--;
    }
    return edad;
}

// ======================================================
// OBTENER PARAMETROS DE URL
// ======================================================
const url = new URLSearchParams(window.location.search);

const solIndex = url.get("sol");  
const ced = url.get("ced");

// ======================================================
// CARGAR SOLICITUD Y CANDIDATO
// ======================================================
let solicitudes = JSON.parse(localStorage.getItem("solicitudes") || "[]");
const solicitud = solicitudes[solIndex];

if (!solicitud) {
  alert("Error: No existe la solicitud.");
}

const candidato = solicitud.candidatos.find(c => c.cedula === ced);

if (!candidato) {
  alert("Error: No se encontró el candidato.");
}

// ======================================================
// ARMAR HTML DINÁMICO
// ======================================================
function cargarDatos() {

  const cont = document.getElementById("contenido");

  // ACCESOS INTERNOS (AS2, InfoTint…)
  let accesosInternos_HTML = "";
  if (solicitud.requiereAccesos === "si" && solicitud.accesosPC?.length > 0) {
    solicitud.accesosPC.forEach(a => {
      accesosInternos_HTML += `
        <div class="col-3 mt-2">
          <input class="form-control readonly-field" value="${a}" readonly>
        </div>`;
    });
  } else {
    accesosInternos_HTML = `<div class="col-12"><small>No se solicitaron accesos internos</small></div>`;
  }

  // ACCESOS TELÉFONO
// ACCESOS TELÉFONO – SOLO MOSTRAR SI EXISTEN
let accesosTel_HTML = "";
let mostrarAccesosTel = false;

if (solicitud.requiereTel === "si" && solicitud.accesosTel?.length > 0) {
    mostrarAccesosTel = true;

    solicitud.accesosTel.forEach(a => {
        accesosTel_HTML += `
          <div class="col-3 mt-2">
            <input class="form-control readonly-field" value="${a}" readonly>
          </div>`;
    });
}


  // ======================================================
  // HTML COMPLETO
  // ======================================================
  cont.innerHTML = `

  <!-- DATOS SOLICITUD -->
  <div class="row">
    <div class="col-6">
      <label>N° Solicitud</label>
      <input class="form-control readonly-field" value="${solicitud.numero}" readonly>
    </div>

    <div class="col-6">
      <label>Solicitante</label>
      <input class="form-control readonly-field" value="${solicitud.solicitante}" readonly>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-6">
      <label>Fecha Solicitud</label>
      <input class="form-control readonly-field" value="${solicitud.fechaSolicitud}" readonly>
    </div>

    <div class="col-6">
      <label>Área</label>
      <input class="form-control readonly-field" value="${solicitud.area}" readonly>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12">
      <label>Departamento</label>
      <input class="form-control readonly-field" value="${solicitud.departamento}" readonly>
    </div>
  </div>



  <!-- DATOS TRABAJADOR -->
  <div class="section-header">Datos del Trabajador</div>

  <div class="row">
    <div class="col-6">
      <label>Nombre Completo</label>
      <input class="form-control readonly-field" value="${candidato.nombre}" readonly>
    </div>

    <div class="col-6">
      <label>Cédula</label>
      <input class="form-control readonly-field" value="${candidato.cedula}" readonly>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-6">
      <label>Código Único</label>
      <input class="form-control readonly-field" value="${candidato.codigoUnico || '-'}" readonly>
    </div>

    <div class="col-6">
      <label>Edad Real</label>
      <input class="form-control readonly-field" value="${calcularEdad(candidato.fechaNacimiento)}" readonly>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-6">
      <label>Fecha de Ingreso</label>
      <input class="form-control readonly-field" value="${candidato.fechaIngreso || '-'}" readonly>
    </div>

    <div class="col-6">
      <label>Cargo</label>
      <input class="form-control readonly-field" value="${solicitud.cargoSolicitado}" readonly>
    </div>
  </div>



  <!-- ACCESOS Y EQUIPOS REQUERIDOS -->
  <div class="section-header">Accesos y/o Equipos Requeridos</div>

  <div class="row">
    <div class="col-6">
      <label>Tipo de Cargo</label>
      <input class="form-control readonly-field" value="${solicitud.tipoCargo}" readonly>
    </div>

    <div class="col-6">
      <label>¿Requiere Accesos?</label>
      <input class="form-control readonly-field" value="${solicitud.requiereAccesos}" readonly>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12 fw-bold">Accesos Internos</div>
    ${accesosInternos_HTML}
  </div>

  <div class="row mt-4">
    <div class="col-6">
      <label>¿Requiere Computador?</label>
      <input class="form-control readonly-field" value="${solicitud.requiereComp}" readonly>
    </div>

    <div class="col-6">
      <label>¿Requiere Teléfono?</label>
      <input class="form-control readonly-field" value="${solicitud.requiereTel}" readonly>
    </div>
  </div>


  <div class="row mt-4">
    <div class="col-6">
      <label>¿Requiere Celular?</label>
      <input class="form-control readonly-field" value="${solicitud.requiereCel}" readonly>
    </div>
  </div>



  <!-- SOLICITUD EXTRA -->
  <div class="row mt-4">
    <div class="col-12">
      <label>Solicitud adicional</label>
      <textarea class="form-control readonly-field" rows="3" readonly>${solicitud.adicional}</textarea>
    </div>
  </div>

  `;
}

cargarDatos();


// ======================================================
// BOTÓN VOLVER
// ======================================================
function regresar() {
  window.location.href = "../evaluacion/entrega-dotacion.html";
}

</script>

  <script src="../../assets/js/ui-shell.js"></script>
</body>
</html>
