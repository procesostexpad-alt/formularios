<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5.1. Aprobación de Ingreso</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .readonly-field {
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
    }
    .table th, .table td {
      text-align: center;
      vertical-align: middle;
    }
  </style>
  <link rel="stylesheet" href="../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../assets/css/ui-shell.css">
</head>

<body class="bg-light p-4">

  <div class="container">

<div id="topHeaderAprobacionIngreso" class="d-flex justify-content-between mb-3 align-items-center">

  <!-- 🔙 BOTÓN VOLVER -->
  <button id="btnVolverAprobacionIngreso" class="btn btn-secondary" onclick="window.history.back()">
    ← Volver
  </button>

  <!-- ⭐ TÍTULO CENTRADO -->
  <h3 id="tituloAprobacionIngreso" class="m-0 flex-grow-1 text-center">Aprobación de Ingreso</h3>


  <div style="width:120px"></div>
</div>

  <div id="mensajeAprobacionIngreso" class="alert alert-success d-none mt-3" role="alert"></div>




    <!-- DATOS DE LA SOLICITUD -->
    <div class="row mb-4">
      <div class="col-md-4">
        <label class="form-label fw-bold">Número de Solicitud</label>
        <input type="text" id="nSolicitud" class="form-control readonly-field" readonly>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-bold">Solicitante</label>
        <input type="text" id="solicitante" class="form-control readonly-field" readonly>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-bold">Fecha Solicitud</label>
        <input type="text" id="fechaSolicitud" class="form-control readonly-field" readonly>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-6">
        <label class="form-label fw-bold">Área</label>
        <input type="text" id="area" class="form-control readonly-field" readonly>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-bold">Departamento</label>
        <input type="text" id="departamento" class="form-control readonly-field" readonly>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-12">
        <label class="form-label fw-bold">Cargo Solicitado</label>
        <input type="text" id="cargoSolicitado" class="form-control readonly-field" readonly>
      </div>
    </div>

    <hr>

    <h5 class="mt-4">Candidatos Registrados</h5>

    <!-- TABLA -->
    <table class="table table-bordered table-hover align-middle mt-3">
    <thead>
      <tr>
        <th>#</th>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Fecha Nacimiento</th>
        <th>Correo</th>
        <th>Teléfono</th>
        <th>Aspiración Salarial</th>
        <th>Información Adicional</th>
        <th>CV</th>
        <th>No Seleccionado</th>
        <th>Aprobado para Ingreso</th>
      </tr>
    </thead>

      <tbody id="tablaCandidatos"></tbody>
    </table>


<!-- BOTONES FINALES CENTRADOS -->
<div class="mt-5 text-center">

  <button id="btnIniciarAprobacionIngreso" class="btn btn-success btn-lg me-3" onclick="iniciarAprobacionIngreso()">
    🟢 Iniciar Aprobación de Ingreso
  </button>

  <button id="btnGuardar" class="btn btn-primary btn-lg me-3" onclick="guardarCambiosGenerales()">
    Guardar Cambios
  </button>

  <button id="btnFinalizarAprobacionIngreso" class="btn btn-danger btn-lg" onclick="finalizarAprobacionIngreso()">
    Finalizar Aprobación de Ingreso
  </button>

</div>


<!-- BOTÓN DE PRUEBA PARA REHABILITAR -->
<div class="mt-3 text-center">
  <button id="btnHabilitarPrueba" class="btn btn-secondary btn-sm" onclick="habilitarAprobacionIngresoPrueba()">
    🔄 Habilitar Aprobación de Ingreso (Pruebas)
  </button>
</div>



  </div>

<script>

let solicitudIndex = null;
let contador = 1;
const MODO_EMBED =
    new URLSearchParams(window.location.search).get("embed") === "1" ||
    window.self !== window.top;

function aplicarModoEmbed() {
    if (!MODO_EMBED) return;
    const btnVolver = document.getElementById("btnVolverAprobacionIngreso");
    if (btnVolver) btnVolver.style.display = "none";

    const topHeader = document.getElementById("topHeaderAprobacionIngreso");
    if (topHeader) {
        topHeader.classList.remove("d-flex");
        topHeader.classList.add("d-none");
        topHeader.setAttribute("hidden", "hidden");
        topHeader.style.setProperty("display", "none", "important");
    }

    const titulo = document.getElementById("tituloAprobacionIngreso");
    if (titulo) titulo.style.setProperty("display", "none", "important");

    const btnPrueba = document.getElementById("btnHabilitarPrueba");
    if (btnPrueba) {
        const contenedorPrueba = btnPrueba.closest(".mt-3.text-center");
        if (contenedorPrueba) contenedorPrueba.style.display = "none";
        else btnPrueba.style.display = "none";
    }
}


function mostrarMensaje(texto) {
    const box = document.getElementById("mensajeAprobacionIngreso");
    box.textContent = texto;
    box.classList.remove("d-none");

    setTimeout(() => {
        box.classList.add("d-none");
    }, 4000);
}


// -------------------------------------------------------
function registrarEtapa(solicitud, nuevaEtapa) {

    if (!solicitud.historialEtapas) solicitud.historialEtapas = [];

    const historico = solicitud.historialEtapas;

    const fecha = new Date().toLocaleString("es-EC", { hour12: false });
    const usuario = "Nicolás Crisanto";

    if (historico.length > 0 && historico[historico.length - 1].etapa === nuevaEtapa) {
        historico[historico.length - 1] = {
            etapa: nuevaEtapa,
            fecha: fecha,
            usuario: usuario
        };
    } else {
        historico.push({
            etapa: nuevaEtapa,
            fecha: fecha,
            usuario: usuario
        });
    }
}


// -------------------------------------------------------
function actualizarHabilitacionChecks() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    const checkboxes = document.querySelectorAll(".chk-noSel, .chk-aprobado");

    if (!solicitud.etapaAprobacionIngreso || solicitud.etapaAprobacionIngreso === "no_iniciada") {
        checkboxes.forEach(chk => chk.disabled = true);
        return;
    }

    if (solicitud.aprobacionIngresoFinalizada) {
        checkboxes.forEach(chk => chk.disabled = true);
        return;
    }

    checkboxes.forEach(chk => chk.disabled = false);
}



// -------------------------------------------------------
function cargarDatosSolicitud() {

    const params = new URLSearchParams(window.location.search);
    solicitudIndex = params.get("sol");

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    if (!solicitud) {
        alert("Error: No existe la solicitud.");
        return;
    }

    document.getElementById("nSolicitud").value = solicitud.numero;
    document.getElementById("solicitante").value = solicitud.solicitante;
    document.getElementById("fechaSolicitud").value = solicitud.fechaSolicitud;
    document.getElementById("area").value = solicitud.area;
    document.getElementById("departamento").value = solicitud.departamento;
    document.getElementById("cargoSolicitado").value = solicitud.cargoSolicitado;

    if (solicitud.aprobacionIngresoFinalizada) {
        bloquearPantalla();
    }
}



// -------------------------------------------------------
function cargarCandidatosSolicitud() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    if (!solicitud || !solicitud.candidatos) return;

    const tabla = document.getElementById("tablaCandidatos");
    tabla.innerHTML = "";
    contador = 1;

    const candidatosFiltrados = solicitud.candidatos.filter(c =>
        c.estado === "pendiente" ||
        c.estado === "postulado" ||
        c.estado === "reproceso" ||
        c.estado === "terna" ||
        c.estado === "no_seleccionado" ||
        c.estado === "seleccionado_oficial" ||
        c.estado === "aprobado_ingreso"
    );

    candidatosFiltrados.forEach(c => {

        const fechaFormateada = c.fechaNacimiento.split("-").reverse().join("-");

        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${contador++}</td>
            <td>${c.cedula}</td>
            <td>${c.nombre}</td>
            <td>${fechaFormateada}</td>
            <td>${c.correo}</td>
            <td>${c.telefono}</td>

            <td>${c.aspiracion ? c.aspiracion + " USD" : "-"}</td>
            <td>${c.infoAdicional ? c.infoAdicional : "-"}</td>

            <td><a href="${c.cv}" target="_blank">${c.cvNombre}</a></td>

            <td><input type="checkbox" class="chk-noSel" data-cedula="${c.cedula}"
                ${c.estado === "no_seleccionado" ? "checked" : ""}></td>

            <td><input type="checkbox" class="chk-aprobado" data-cedula="${c.cedula}"
                ${c.estado === "aprobado_ingreso" ? "checked" : ""}></td>
        `;

        tabla.appendChild(row);
        actualizarChecks(row);
    });

    if (JSON.parse(localStorage.getItem("solicitudes"))[solicitudIndex].aprobacionIngresoFinalizada) {
        bloquearPantalla();
    }
}



// -------------------------------------------------------
function actualizarChecks(row) {

    const noSel = row.querySelector(".chk-noSel");
    const aprobado = row.querySelector(".chk-aprobado");

    noSel.addEventListener("change", () => {
        if (noSel.checked) aprobado.checked = false;
    });

    aprobado.addEventListener("change", () => {
        if (aprobado.checked) noSel.checked = false;
    });
}



// -------------------------------------------------------
function guardarCambiosGenerales() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    if (!solicitud) return;

    solicitud.candidatos.forEach(candidato => {

        const chkNoSel = document.querySelector(`.chk-noSel[data-cedula="${candidato.cedula}"]`);
        const chkApr = document.querySelector(`.chk-aprobado[data-cedula="${candidato.cedula}"]`);

        if (chkNoSel && chkApr) {
            if (chkNoSel.checked) candidato.estado = "no_seleccionado";
            else if (chkApr.checked) candidato.estado = "aprobado_ingreso";
            else candidato.estado = "pendiente";
        }
    });

    localStorage.setItem("solicitudes", JSON.stringify(lista));
    mostrarMensaje("✔ Cambios guardados correctamente.");
}



// -------------------------------------------------------
function finalizarAprobacionIngreso() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    solicitud.candidatos.forEach(candidato => {

        const chkNoSel = document.querySelector(`.chk-noSel[data-cedula="${candidato.cedula}"]`);
        const chkApr = document.querySelector(`.chk-aprobado[data-cedula="${candidato.cedula}"]`);

        if (chkNoSel && chkApr) {
            if (chkNoSel.checked) candidato.estado = "no_seleccionado";
            else if (chkApr.checked) candidato.estado = "aprobado_ingreso";
            else candidato.estado = "pendiente";
        }
    });

    localStorage.setItem("solicitudes", JSON.stringify(lista));

    const algunInvalido = solicitud.candidatos.some(c =>
        c.estado !== "aprobado_ingreso" &&
        c.estado !== "no_seleccionado"
    );

    if (algunInvalido) {
        mostrarMensaje("⚠ Debe seleccionar APROBADO PARA INGRESO o NO SELECCIONADO para TODOS los candidatos antes de finalizar.");
        return;
    }

    if (!confirm("⚠ Esta acción finalizará la aprobación de ingreso. ¿Desea continuar?")) return;

    solicitud.aprobacionIngresoFinalizada = true;
    solicitud.estadoAprobacionIngreso = "Aprobación de Ingreso Finalizada";
    solicitud.etapaAprobacionIngreso = "finalizada";

    registrarEtapa(solicitud, "aprobacion-ingreso-finalizada");

    localStorage.setItem("solicitudes", JSON.stringify(lista));

    bloquearPantalla();
    actualizarBotonesSegunEtapa();
    actualizarHabilitacionChecks();

    mostrarMensaje("✔ Aprobación de ingreso finalizada correctamente.");
}



// -------------------------------------------------------
function bloquearPantalla() {

    document.querySelectorAll("input[type='checkbox']").forEach(chk => {
        chk.disabled = true;
    });

    document.getElementById("btnGuardar").style.display = "none";
    document.getElementById("btnFinalizarAprobacionIngreso").style.display = "none";
}



// -------------------------------------------------------
function actualizarBotonesSegunEtapa() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    const btnIniciar = document.getElementById("btnIniciarAprobacionIngreso");
    const btnGuardar = document.getElementById("btnGuardar");
    const btnFinalizar = document.getElementById("btnFinalizarAprobacionIngreso");

    if (solicitud.aprobacionIngresoFinalizada) {
        btnIniciar.style.display = "none";
        btnGuardar.style.display = "none";
        btnFinalizar.style.display = "none";
        return;
    }

    if (!solicitud.etapaAprobacionIngreso || solicitud.etapaAprobacionIngreso === "no_iniciada") {
        btnIniciar.style.display = "inline-block";
        btnGuardar.style.display = "none";
        btnFinalizar.style.display = "none";
        return;
    }

    if (solicitud.etapaAprobacionIngreso === "iniciada") {
        btnIniciar.style.display = "none";
        btnGuardar.style.display = "inline-block";
        btnFinalizar.style.display = "inline-block";
        return;
    }
}



// -------------------------------------------------------
window.onload = function () {
    aplicarModoEmbed();
    cargarDatosSolicitud();
    cargarCandidatosSolicitud();
    actualizarBotonesSegunEtapa();
    actualizarHabilitacionChecks();
};



// -------------------------------------------------------
function habilitarAprobacionIngresoPrueba() {

    if (!confirm("¿Habilitar nuevamente la aprobación de ingreso para pruebas?")) return;

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    if (solicitud.estadoOriginal) {
        solicitud.estado = solicitud.estadoOriginal;
    }

    solicitud.candidatos.forEach(c => {
        if (c.estadoOriginal) {
            c.estado = c.estadoOriginal;
        }
    });

    solicitud.aprobacionIngresoFinalizada = false;
    solicitud.etapaAprobacionIngreso = "no_iniciada";

    if (solicitud.historialEtapas) {
        solicitud.historialEtapas = solicitud.historialEtapas.filter(e =>
            !e.etapa.startsWith("aprobacion-ingreso-")
        );
    }

    localStorage.setItem("solicitudes", JSON.stringify(lista));

    actualizarBotonesSegunEtapa();
    actualizarHabilitacionChecks();

    mostrarMensaje("✔ Aprobación de ingreso restaurada. Lista para iniciar pruebas nuevamente.");
}



// -------------------------------------------------------
function iniciarAprobacionIngreso() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    if (!solicitud.candidatos) solicitud.candidatos = [];

    if (!solicitud.estadoOriginal) {
        solicitud.estadoOriginal = solicitud.estado || solicitud.estadoAprobacionIngreso || "pendiente";
    }

    solicitud.candidatos.forEach(c => {
        if (!c.estadoOriginal) c.estadoOriginal = c.estado;
    });

    registrarEtapa(solicitud, "aprobacion-ingreso-iniciada");

    solicitud.etapaAprobacionIngreso = "iniciada";

    localStorage.setItem("solicitudes", JSON.stringify(lista));

    mostrarMensaje("✔ Aprobación de ingreso iniciada correctamente. Ahora puedes trabajar los candidatos.");

    actualizarBotonesSegunEtapa();
    actualizarHabilitacionChecks();
}

</script>

  <script src="../../assets/js/ui-shell.js"></script>
</body>
</html>
