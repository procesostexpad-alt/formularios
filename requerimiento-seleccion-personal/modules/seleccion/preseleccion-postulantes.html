<!DOCTYPE html>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .readonly-field {
      background-color: #f8f9fa;

    .btn-iniciar-preseleccion {
      border: 0;
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.2px;

      box-shadow: 0 10px 20px rgba(20, 130, 95, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      animation: pulseInicio 2.2s infinite;
    }
    .btn-iniciar-preseleccion:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 22px rgba(20, 130, 95, 0.35);
      filter: brightness(1.04);
    }
    .btn-iniciar-preseleccion:active {
      transform: translateY(0);
    }
    .btn-iniciar-preseleccion.is-loading {
      opacity: 0.9;
      pointer-events: none;
      animation: none;
    }
    .mensaje-pop {
      animation: mensajeEntrada 0.25s ease-out;

      0% { box-shadow: 0 10px 20px rgba(20, 130, 95, 0.25); }

<body class="bg-light p-4">

  <div class="container">

<div id="topHeaderPreseleccion" class="d-flex justify-content-between mb-3 align-items-center">

</div>


    <!-- DATOS DE LA SOLICITUD -->

  <button id="btnIniciarPreseleccion" class="btn btn-lg me-3 btn-iniciar-preseleccion" onclick="iniciarPreseleccion()">

  <button id="btnFinalizar" class="btn btn-danger btn-lg" onclick="finalizarPreseleccion()">
    Finalizar Preseleccion
  </button>

</div>

<div id="pdfModal" class="pdf-modal" aria-hidden="true" style="position: fixed; inset: 0; z-index: 3000; display: none;">
  <div class="pdf-modal-backdrop" onclick="cerrarPdfModal()" style="position: absolute; inset: 0; background: rgba(15, 24, 24, 0.65);"></div>
  <section class="pdf-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="pdfModalTitle" style="position: relative; z-index: 1; width: min(1200px, 96vw); height: min(92vh, 860px); margin: 3vh auto; border-radius: 14px; overflow: hidden; border: 1px solid #c9d5d1; background: #fff; box-shadow: 0 28px 52px rgba(10, 26, 25, 0.38); display: flex; flex-direction: column;">
    <header class="pdf-modal-head" style="padding: 10px 12px; border-bottom: 1px solid #d7e1de; background: #f2f7f5; display: flex; gap: 10px; justify-content: space-between; align-items: center; flex-wrap: wrap;">
      <p id="pdfModalTitle" style="margin: 0; font-size: 0.9rem; color: #4e5f63;">Vista previa PDF de solicitud</p>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button type="button" class="btn btn-outline-secondary btn-sm" onclick="descargarPdfActual()">Descargar</button>
        <button type="button" class="btn btn-outline-dark btn-sm" onclick="abrirPdfActual()">Abrir en pestaña</button>
        <button type="button" class="btn btn-danger btn-sm" onclick="cerrarPdfModal()">Cerrar</button>
      </div>
    </header>
    <iframe id="pdfPreviewFrame" class="pdf-modal-frame" title="Vista previa PDF" style="border: 0; width: 100%; height: 100%; flex: 1; background: #2b2f35;"></iframe>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>

let solicitudIndex = null;
let contador = 1;
let pdfActualUrl = "";
let pdfActualNombre = "solicitud.pdf";
const MODO_EMBED =
    new URLSearchParams(window.location.search).get("embed") === "1" ||
    window.self !== window.top;

function aplicarModoEmbed() {
    if (!MODO_EMBED) return;
    const btnVolver = document.getElementById("btnVolver");
    if (btnVolver) btnVolver.style.display = "none";
    const topHeader = document.getElementById("topHeaderPreseleccion");
    if (topHeader) {
        topHeader.classList.remove("d-flex");
        topHeader.classList.add("d-none");
        topHeader.setAttribute("hidden", "hidden");
        topHeader.style.setProperty("display", "none", "important");
    }

    const tituloPrincipal = document.getElementById("tituloVistaPreseleccion");
    if (tituloPrincipal) {
        tituloPrincipal.style.setProperty("display", "none", "important");
    }

    // Respaldo: si por cualquier razon no se detecta el header por id, ocultar el h3 principal.
    const h3Principal = document.querySelector(".container > h3");
    if (h3Principal) h3Principal.style.setProperty("display", "none", "important");
}

function mostrarMensaje(texto, tipo = "success") {
    const box = document.getElementById("mensajePreseleccion");
    box.textContent = texto;
    box.classList.remove("alert-success", "alert-warning", "alert-danger", "mensaje-pop");
    box.classList.add(`alert-${tipo}`, "mensaje-pop");
    box.classList.remove("d-none");

    setTimeout(() => {
        box.classList.add("d-none");
    }, 4000);
}


// -------------------------------------------------------
function registrarEtapa(solicitud, nuevaEtapa) {

    if (!solicitud.historialEtapas) solicitud.historialEtapas = [];

    const historico = solicitud.historialEtapas;

    const fecha = new Date().toLocaleString("es-EC", { hour12: false });

    const usuario = "Nicolas Crisanto";

    // Evitar duplicados
    if (historico.length > 0 && historico[historico.length - 1].etapa === nuevaEtapa) {
        historico[historico.length - 1] = {
            etapa: nuevaEtapa,
            fecha: fecha,
            usuario: usuario
        };
    } else {
        historico.push({
            etapa: nuevaEtapa,
            fecha: fecha,
            usuario: usuario
        });
    }
}


function actualizarHabilitacionChecks() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    const checkboxes = document.querySelectorAll(".chk-noSel, .chk-terna");

    // Antes de iniciar -> bloquear checkboxes
    if (!solicitud.etapaPreseleccion || solicitud.etapaPreseleccion === "no_iniciada") {
        checkboxes.forEach(chk => chk.disabled = true);
        return;
    }

    // Si ya finalizo -> bloquear checkboxes
    if (solicitud.preseleccionFinalizada) {
        checkboxes.forEach(chk => chk.disabled = true);
        return;
    }

    // Si esta iniciada -> habilitar checkboxes
    checkboxes.forEach(chk => chk.disabled = false);
}


// CARGAR DATOS DE LA SOLICITUD
// -------------------------------------------------------
function cargarDatosSolicitud() {

    const params = new URLSearchParams(window.location.search);
    solicitudIndex = params.get("sol");

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    if (!solicitud) {
        alert("Error: No existe la solicitud.");
        return;
    }

    document.getElementById("nSolicitud").value = solicitud.numero;
    document.getElementById("solicitante").value = solicitud.solicitante;
    document.getElementById("fechaSolicitud").value = solicitud.fechaSolicitud;
    document.getElementById("area").value = solicitud.area;
    document.getElementById("departamento").value = solicitud.departamento;
    document.getElementById("cargoSolicitado").value = solicitud.cargoSolicitado;

    // Si ya estaba finalizada, bloquear controles
    if (solicitud.preseleccionFinalizada) {
        bloquearPantalla();
    }
}


// -------------------------------------------------------
// CARGAR CANDIDATOS ACTIVOS
// -------------------------------------------------------
function cargarCandidatosSolicitud() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    if (!solicitud || !solicitud.candidatos) return;

    const tabla = document.getElementById("tablaCandidatos");
    tabla.innerHTML = "";
    contador = 1;

    const candidatosFiltrados = solicitud.candidatos.filter(c =>
        c.estado === "pendiente" ||
        c.estado === "postulado" ||
        c.estado === "reproceso" ||
        c.estado === "no_seleccionado" ||
        c.estado === "terna"
    );

    candidatosFiltrados.forEach(c => {

        const fechaFormateada = c.fechaNacimiento.split("-").reverse().join("-");

        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${contador++}</td>
            <td>${c.cedula}</td>
            <td>${c.nombre}</td>
            <td>${fechaFormateada}</td>
            <td>${c.correo}</td>
            <td>${c.telefono}</td>

            <td>${c.aspiracion ? c.aspiracion + " USD" : "-"}</td>
            <td>${c.infoAdicional ? c.infoAdicional : "-"}</td>

            <td><a href="${c.cv}" target="_blank">${c.cvNombre}</a></td>

            <td><input type="checkbox" class="chk-noSel" data-cedula="${c.cedula}" 
                ${c.estado === "no_seleccionado" ? "checked" : ""}></td>

            <td><input type="checkbox" class="chk-terna" data-cedula="${c.cedula}"
                ${c.estado === "terna" ? "checked" : ""}></td>
        `;


        tabla.appendChild(row);

        actualizarChecks(row);
    });

    // Si ya estaba finalizado -> bloquear
    if (JSON.parse(localStorage.getItem("solicitudes"))[solicitudIndex].preseleccionFinalizada) {
        bloquearPantalla();
    }
}


// -------------------------------------------------------
// CONTROL CHECKS
// -------------------------------------------------------
function actualizarChecks(row) {

    const noSel = row.querySelector(".chk-noSel");
    const terna = row.querySelector(".chk-terna");
    const cedula = noSel?.dataset?.cedula;

    if (!noSel || !terna || !cedula) return;

    noSel.addEventListener("change", () => {
        if (noSel.checked) terna.checked = false;
        guardarEstadoCandidato(cedula, noSel, terna);
    });

    terna.addEventListener("change", () => {
        if (terna.checked) noSel.checked = false;
        guardarEstadoCandidato(cedula, noSel, terna);
    });
}


// -------------------------------------------------------
// GUARDAR AUTOMATICAMENTE CADA CAMBIO DE CANDIDATO
// -------------------------------------------------------
function guardarEstadoCandidato(cedula, chkNoSel, chkTerna) {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    if (!solicitud || !solicitud.candidatos) return;

    const candidato = solicitud.candidatos.find(c => String(c.cedula) === String(cedula));
    if (!candidato) return;

    if (chkNoSel.checked) {
        candidato.estado = "no_seleccionado";
    } else if (chkTerna.checked) {
        candidato.estado = "terna";
    } else {
        candidato.estado = "pendiente";
    }

    localStorage.setItem("solicitudes", JSON.stringify(lista));
}




// -------------------------------------------------------
// FINALIZAR PRESELECCION
// -------------------------------------------------------
function finalizarPreseleccion() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    // 1) GUARDAR AUTOMATICAMENTE LO QUE ESTA EN PANTALLA ANTES DE VALIDAR
    solicitud.candidatos.forEach(candidato => {

        const chkNoSel = document.querySelector(`.chk-noSel[data-cedula="${candidato.cedula}"]`);
        const chkTerna = document.querySelector(`.chk-terna[data-cedula="${candidato.cedula}"]`);

        if (chkNoSel && chkTerna) {

            if (chkNoSel.checked) {
                candidato.estado = "no_seleccionado";
            } 
            else if (chkTerna.checked) {
                candidato.estado = "terna";
            } 
            else {
                candidato.estado = "pendiente"; // no marcado
            }

        }
    });

    // Guardar lo recien leido
    localStorage.setItem("solicitudes", JSON.stringify(lista));

    // 2) VALIDAR QUE EXISTA AL MENOS UN CHECK SELECCIONADO
    const algunSeleccionado = solicitud.candidatos.some(c =>
        c.estado === "no_seleccionado" || c.estado === "terna"
    );

    if (!algunSeleccionado) {
        mostrarMensaje("Selecciona al menos un check (No seleccionado o Preseleccion) para poder finalizar.", "warning");
        return;
    }

    // 3) VALIDAR QUE NINGUN CANDIDATO QUEDE EN "pendiente"
    const algunPendiente = solicitud.candidatos.some(c => c.estado === "pendiente");

    if (algunPendiente) {
        mostrarMensaje("Completa los checks pendientes para poder finalizar la preseleccion.", "warning");
        return;
    }

    // 4) CONFIRMACION
    if (!confirm("Esta accion finalizara la preseleccion. Desea continuar?")) return;

    // 5) FINALIZAR
    solicitud.preseleccionFinalizada = true;
    solicitud.estadoPreseleccion = "Preseleccion Finalizada";

    solicitud.etapaPreseleccion = "finalizada";

    registrarEtapa(solicitud, "preseleccion-finalizada");

    localStorage.setItem("solicitudes", JSON.stringify(lista));

    bloquearPantalla();
    actualizarBotonesSegunEtapa();
    actualizarHabilitacionChecks();

    mostrarMensaje("Preseleccion finalizada correctamente.");
}




// -------------------------------------------------------
// BLOQUEAR TODA LA PANTALLA (cuando ya esta finalizado)
// -------------------------------------------------------
function bloquearPantalla() {

    document.querySelectorAll("input[type='checkbox']").forEach(chk => {
        chk.disabled = true;
    });

    document.getElementById("btnFinalizar").style.display = "none";
}


function actualizarBotonesSegunEtapa() {

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    const btnIniciar = document.getElementById("btnIniciarPreseleccion");
    const btnFinalizar = document.getElementById("btnFinalizar");

    // Si esta finalizada, ocultar todo
    if (solicitud.preseleccionFinalizada) {
        btnIniciar.style.display = "none";
        btnFinalizar.style.display = "none";
        return;
    }

    // Si no inicia, mostrar solo el boton de inicio
    if (!solicitud.etapaPreseleccion || solicitud.etapaPreseleccion === "no_iniciada") {
        btnIniciar.style.display = "inline-block";
        btnIniciar.disabled = false;
        btnIniciar.classList.remove("is-loading");
        btnIniciar.innerHTML = '<span aria-hidden="true">&#9654;</span> Iniciar Preseleccion';
        btnFinalizar.style.display = "none";
        return;
    }

    // Si ya inicio, mostrar solo finalizar
    if (solicitud.etapaPreseleccion === "iniciada") {
        btnIniciar.style.display = "none";
        btnFinalizar.style.display = "inline-block";
        return;
    }
}

// -------------------------------------------------------
window.onload = function () {
    aplicarModoEmbed();
    cargarDatosSolicitud();
    cargarCandidatosSolicitud();
    actualizarBotonesSegunEtapa();
    actualizarHabilitacionChecks();  // <--- NUEVO
};




/* ========================================================
   INICIAR PRESELECCION
   ======================================================== */
function iniciarPreseleccion() {

    const btnIniciar = document.getElementById("btnIniciarPreseleccion");
    if (btnIniciar) {
        btnIniciar.disabled = true;
        btnIniciar.classList.add("is-loading");
        btnIniciar.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Iniciando...';
    }


    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista[solicitudIndex];

    if (!solicitud.candidatos) solicitud.candidatos = [];


    // Guardar estado original una sola vez
    if (!solicitud.estadoOriginal) {
        solicitud.estadoOriginal = solicitud.estado || solicitud.estadoPreseleccion || "pendiente";
    }

    // Guardar estados originales de candidatos
    solicitud.candidatos.forEach(c => {
        if (!c.estadoOriginal) c.estadoOriginal = c.estado;
    });

    // Registrar etapa en historial
    registrarEtapa(solicitud, "preseleccion-iniciada");

    // Marcar bandera
    solicitud.etapaPreseleccion = "iniciada";

    localStorage.setItem("solicitudes", JSON.stringify(lista));

    // Mostrar mensaje
    mostrarMensaje("Preseleccion iniciada correctamente. Ahora puedes trabajar los candidatos.");

    // Actualizar botones si los tienes configurados
    if (typeof actualizarBotonesSegunEtapa === "function") {
        actualizarBotonesSegunEtapa();
        actualizarHabilitacionChecks();

    }
}

// =====================================================
// FUNCIONES PDF
// =====================================================
function textoPdf(valor) {
  if (valor === null || valor === undefined) return "-";
  const limpio = String(valor).replace(/\s+/g, " ").trim();
  return limpio ? limpio : "-";
}

function nombreArchivoPdf(solicitud) {
  const base = textoPdf(solicitud.numero).replace(/[^a-zA-Z0-9_-]/g, "_");
  return "solicitud_" + (base || "sin_numero") + ".pdf";
}

function cerrarPdfModal() {
  const modal = document.getElementById("pdfModal");
  const frame = document.getElementById("pdfPreviewFrame");
  if (frame) frame.removeAttribute("src");
  if (pdfActualUrl) {
    URL.revokeObjectURL(pdfActualUrl);
    pdfActualUrl = "";
  }
  if (modal) {
    modal.style.display = "none";
    modal.setAttribute("aria-hidden", "true");
  }
  document.body.style.overflow = "";
}

function abrirPdfActual() {
  if (!pdfActualUrl) return;
  window.open(pdfActualUrl, "_blank");
}

function descargarPdfActual() {
  if (!pdfActualUrl) return;
  const link = document.createElement("a");
  link.href = pdfActualUrl;
  link.download = pdfActualNombre || "solicitud.pdf";
  document.body.appendChild(link);
  link.click();
  link.remove();
}

function abrirPdfEnModal(doc, nombreArchivo) {
  const modal = document.getElementById("pdfModal");
  const frame = document.getElementById("pdfPreviewFrame");
  if (!modal || !frame) return;

  if (pdfActualUrl) URL.revokeObjectURL(pdfActualUrl);
  pdfActualUrl = URL.createObjectURL(doc.output("blob"));
  pdfActualNombre = nombreArchivo || "solicitud.pdf";
  frame.src = pdfActualUrl + "#toolbar=1&navpanes=1&scrollbar=1&view=FitH";
  modal.style.display = "block";
  modal.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
}

function crearPdfSolicitud(sol) {
  const jsPDF = window.jspdf.jsPDF;
  if (!jsPDF) return null;

  const doc = new jsPDF();
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  let currentY = 10;

  // Título
  doc.setFontSize(16);
  doc.text("SOLICITUD DE REQUERIMIENTO DE PERSONAL", pageWidth / 2, currentY, { align: "center" });
  currentY += 10;

  // Información general
  doc.setFontSize(10);
  doc.text(`Número: ${textoPdf(sol.numero)}`, 10, currentY);
  doc.text(`Fecha: ${textoPdf(sol.fechaSolicitud)}`, 100, currentY);
  currentY += 5;
  doc.text(`Solicitante: ${textoPdf(sol.solicitante)}`, 10, currentY);
  doc.text(`Área: ${textoPdf(sol.area)}`, 100, currentY);
  currentY += 5;
  doc.text(`Departamento: ${textoPdf(sol.departamento)}`, 10, currentY);
  doc.text(`Cargo: ${textoPdf(sol.cargoSolicitado)}`, 100, currentY);
  currentY += 10;

  // Tabla de candidatos
  if (sol.candidatos && sol.candidatos.length > 0) {
    doc.setFontSize(12);
    doc.text("Candidatos:", 10, currentY);
    currentY += 5;

    const tableData = sol.candidatos.map((c, idx) => [
      String(idx + 1),
      textoPdf(c.nombre),
      textoPdf(c.cedula),
      textoPdf(c.estado)
    ]);

    doc.autoTable({
      head: [["#", "Nombre", "Cédula", "Estado"]],
      body: tableData,
      startY: currentY,
      margin: 10,
      styles: { fontSize: 9, cellPadding: 3 },
      headStyles: { fillColor: [15, 95, 78], textColor: 255 }
    });
  }

  return doc;
}

function verSolicitudPdf() {
  const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
  const sol = lista[solicitudIndex];
  if (!sol) {
    alert("No se encontro la solicitud seleccionada.");
    return;
  }
  const doc = crearPdfSolicitud(sol);
  if (!doc) return;
  abrirPdfEnModal(doc, nombreArchivoPdf(sol));
}

window.addEventListener("keydown", event => {
  if (event.key === "Escape") {
    const modal = document.getElementById("pdfModal");
    if (modal && modal.style.display === "block") {
      cerrarPdfModal();
    }
  }
});
</script>
