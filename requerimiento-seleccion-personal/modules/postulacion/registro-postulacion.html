<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Postulacion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../assets/css/ui-shell.css">
  <style>
    .form-wrapper {
      max-width: 1200px;
      margin: 0 auto;
    }

    .btn-large {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    #mensajeFinal {
      display: none;
      text-align: center;
      padding: 48px 24px;
      background: var(--gt-surface);
      border: 1px solid var(--gt-line);
      border-radius: 14px;
      box-shadow: var(--gt-shadow);
    }

    #mensajeFinal h1 {
      font-size: 2rem;
      color: var(--gt-brand);
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    #mensajeFinal p {
      font-size: 1.05rem;
      margin: 0;
      color: var(--gt-text);
    }
  </style>
</head>
<body class="p-4">
  <div class="form-wrapper">
    <div id="formularioCard" class="module-card p-4">
      <h3 class="mb-4">Registro de Postulacion</h3>

      <label class="form-label fw-bold">Numero de Solicitud</label>
      <select id="selectSolicitud" class="form-control mb-4"></select>

      <div class="row">
        <div class="col-md-3 mb-3">
          <label class="form-label">Cedula</label>
          <input type="text" id="cedula" class="form-control" placeholder="Cedula" maxlength="10" inputmode="numeric">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Nombre Completo</label>
          <input type="text" id="nombre" class="form-control" placeholder="Nombre Completo">
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Fecha de Nacimiento</label>
          <input type="date" id="fechaNacimiento" class="form-control">
        </div>

        <div class="col-md-2 mb-3">
          <label class="form-label">Cargar CV (PDF)</label>
          <input type="file" id="cv" class="form-control" accept=".pdf">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Correo Electronico</label>
          <input type="email" id="correo" class="form-control" placeholder="Correo Electronico">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Numero de Telefono</label>
          <input type="tel" id="telefono" class="form-control" placeholder="Numero de Telefono" maxlength="10" inputmode="numeric">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Aspiracion Salarial (USD)</label>
        <input type="number" id="aspiracion" class="form-control" placeholder="Ej: 550 - 1000">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Informacion adicional (opcional)</label>
        <textarea id="infoAdicional" class="form-control" rows="3" placeholder="Escriba cualquier detalle adicional..."></textarea>
      </div>

      <button class="btn btn-primary btn-large mt-3" onclick="guardarPostulacion()">
        Postular
      </button>
    </div>

    <div id="mensajeFinal" class="mt-4">
      <h1>Gracias por tu postulacion</h1>
      <p>Tu informacion fue enviada correctamente. Si eres seleccionado, nos pondremos en contacto contigo.</p>
    </div>
  </div>

  <script>
    let solicitudIndex = null;

    function soloDigitos(valor) {
      return String(valor || "").replace(/\D/g, "");
    }

    function fechaMaximaNacimiento18() {
      const hoy = new Date();
      const corte = new Date(hoy.getFullYear() - 18, hoy.getMonth(), hoy.getDate());
      const yyyy = corte.getFullYear();
      const mm = String(corte.getMonth() + 1).padStart(2, "0");
      const dd = String(corte.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function esMayorOIgual18(fechaIso) {
      if (!fechaIso) return false;
      const nacimiento = new Date(`${fechaIso}T00:00:00`);
      if (Number.isNaN(nacimiento.getTime())) return false;

      const hoy = new Date();
      let edad = hoy.getFullYear() - nacimiento.getFullYear();
      const mes = hoy.getMonth() - nacimiento.getMonth();
      const dia = hoy.getDate() - nacimiento.getDate();

      if (mes < 0 || (mes === 0 && dia < 0)) edad -= 1;
      return edad >= 18;
    }

    function cargarSolicitudesHabilitadas() {
      const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
      const select = document.getElementById("selectSolicitud");
      const hoy = new Date().toISOString().split("T")[0];

      select.innerHTML = '<option value="">Seleccione una solicitud habilitada</option>';

      lista.forEach((sol, index) => {
        const dentroDeRango = (
          sol.fechaInicioPostulacion &&
          sol.fechaFinPostulacion &&
          hoy >= sol.fechaInicioPostulacion &&
          hoy <= sol.fechaFinPostulacion
        );

        if (
          sol.estado === "Aprobado" &&
          sol.postulacionActiva === true &&
          sol.postulacionCerrada !== true &&
          dentroDeRango
        ) {
          const numero = String(sol.numero || "").trim() || `Solicitud ${index + 1}`;
          const cargo = String(sol.cargoSolicitado || "").trim() || "Cargo sin definir";
          select.innerHTML += `<option value="${index}">${numero} - ${cargo}</option>`;
        }
      });
    }

    function guardarPostulacion() {
      solicitudIndex = document.getElementById("selectSolicitud").value;

      if (!solicitudIndex) {
        alert("Debe seleccionar una solicitud habilitada.");
        return;
      }

      const cedulaVal = soloDigitos(cedula.value).slice(0, 10);
      const nombreVal = nombre.value.trim();
      const fechaNVal = fechaNacimiento.value;
      const correoVal = correo.value.trim();
      const telefonoVal = soloDigitos(telefono.value).slice(0, 10);
      const aspiracionVal = aspiracion.value.trim();
      const cvFile = cv.files[0];
      const infoAdicionalVal = document.getElementById("infoAdicional").value.trim();

      if (!cedulaVal || !nombreVal || !fechaNVal || !correoVal || !telefonoVal || !aspiracionVal || !cvFile) {
        alert("Complete todos los campos obligatorios.");
        return;
      }

      if (cedulaVal.length !== 10 || isNaN(cedulaVal)) {
        alert("La cedula debe tener 10 digitos numericos.");
        return;
      }

      if (!esMayorOIgual18(fechaNVal)) {
        alert("La fecha de nacimiento debe corresponder a una edad mayor o igual a 18 anos.");
        return;
      }

      if (!correoVal.includes("@")) {
        alert("Correo invalido.");
        return;
      }

      if (telefonoVal.length === 0 || telefonoVal.length > 10 || isNaN(telefonoVal)) {
        alert("Telefono invalido. Debe tener maximo 10 digitos numericos.");
        return;
      }

      if (isNaN(aspiracionVal) || Number(aspiracionVal) <= 0) {
        alert("Aspiracion salarial invalida.");
        return;
      }

      if (cvFile.type !== "application/pdf") {
        alert("Solo se aceptan archivos PDF.");
        return;
      }

      const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
      const solicitud = lista[solicitudIndex];

      if (solicitud.candidatos && solicitud.candidatos.some(c => c.cedula === cedulaVal)) {
        alert("Tu postulacion ya fue registrada.");
        return;
      }

      const fileURL = URL.createObjectURL(cvFile);

      const candidato = {
        cedula: cedulaVal,
        nombre: nombreVal,
        fechaNacimiento: fechaNVal,
        correo: correoVal,
        telefono: telefonoVal,
        aspiracion: aspiracionVal,
        infoAdicional: infoAdicionalVal,
        cv: fileURL,
        cvNombre: cvFile.name,
        estado: "pendiente"
      };

      if (!solicitud.candidatos) solicitud.candidatos = [];
      solicitud.candidatos.push(candidato);

      localStorage.setItem("solicitudes", JSON.stringify(lista));

      document.getElementById("formularioCard").style.display = "none";
      document.getElementById("mensajeFinal").style.display = "block";
    }

    window.onload = function () {
      const fechaNacimientoInput = document.getElementById("fechaNacimiento");
      if (fechaNacimientoInput) {
        fechaNacimientoInput.max = fechaMaximaNacimiento18();
      }

      const cedulaInput = document.getElementById("cedula");
      if (cedulaInput) {
        cedulaInput.addEventListener("input", () => {
          cedulaInput.value = soloDigitos(cedulaInput.value).slice(0, 10);
        });
      }

      const telefonoInput = document.getElementById("telefono");
      if (telefonoInput) {
        telefonoInput.addEventListener("input", () => {
          telefonoInput.value = soloDigitos(telefonoInput.value).slice(0, 10);
        });
      }

      cargarSolicitudesHabilitadas();
    };
  </script>

  <script src="../../assets/js/ui-shell.js"></script>
</body>
</html>
