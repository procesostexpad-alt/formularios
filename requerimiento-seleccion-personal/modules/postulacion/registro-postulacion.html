<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2.1. Postulación de Candidato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background: #f5f6fa; }
    .card { padding: 25px; border-radius: 12px; }
    .btn-large { width: 100%; padding: 14px; font-size: 1.1rem; }

    #mensajeFinal {
      display: none;
      text-align: center;
      padding: 50px;
    }
    #mensajeFinal h1 {
      font-size: 2.3rem;
      color: #28a745;
      font-weight: bold;
    }
    #mensajeFinal p {
      font-size: 1.2rem;
      margin-top: 10px;
      color: #444;
    }
  </style>
  <link rel="stylesheet" href="../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../assets/css/ui-shell.css">
</head>

<body class="p-4">

  <div class="container">

    <!-- ⭐ FORMULARIO -->
    <div id="formularioCard" class="card shadow-sm">

      <h3 class="mb-4 text-primary">Procesar Candidatos</h3>

      <label class="form-label fw-bold">Número de Solicitud</label>
      <select id="selectSolicitud" class="form-control mb-4"></select>

      <div class="row">

        <div class="col-md-3 mb-3">
          <label class="form-label">Cédula</label>
          <input type="text" id="cedula" class="form-control" placeholder="Cédula">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Nombre Completo</label>
          <input type="text" id="nombre" class="form-control" placeholder="Nombre Completo">
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Fecha de Nacimiento</label>
          <input type="date" id="fechaNacimiento" class="form-control">
        </div>

        <div class="col-md-2 mb-3">
          <label class="form-label">Cargar CV (PDF)</label>
          <input type="file" id="cv" class="form-control" accept=".pdf">
        </div>
      </div>

      <div class="row">

        <div class="col-md-6 mb-3">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" id="correo" class="form-control" placeholder="Correo Electrónico">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Número de Teléfono</label>
          <input type="tel" id="telefono" class="form-control" placeholder="Número de Teléfono">
        </div>
      </div>

      <!-- ⭐ ASPIRACIÓN SALARIAL -->
      <div class="mb-3">
        <label class="form-label fw-bold">Aspiración Salarial (USD)</label>
        <input type="number" id="aspiracion" class="form-control" placeholder="Ej: 550 - 1000">
      </div>

      <!-- ⭐ CAMPO ADICIONAL NO OBLIGATORIO -->
      <div class="mb-3">
        <label class="form-label fw-bold">Información adicional (opcional)</label>
        <textarea id="infoAdicional" class="form-control" rows="3" placeholder="Escriba cualquier detalle adicional..."></textarea>
      </div>

      <button class="btn btn-primary btn-large mt-3" onclick="guardarPostulacion()">
        Postular
      </button>

    </div>

    <!-- ⭐ MENSAJE FINAL -->
    <div id="mensajeFinal">
      <h1>🎉 ¡Gracias por tu postulación!</h1>
      <p>Tu información ha sido enviada correctamente.
      En caso de ser seleccionado, nos pondremos en contacto contigo.</p>
    </div>

  </div>

  <script>

    let solicitudIndex = null;

    function cargarSolicitudesHabilitadas() {
        const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
        const select = document.getElementById("selectSolicitud");
        const hoy = new Date().toISOString().split("T")[0];

        select.innerHTML = `<option value="">Seleccione una solicitud habilitada</option>`;

        lista.forEach((sol, index) => {
            const dentroDeRango = (
              sol.fechaInicioPostulacion &&
              sol.fechaFinPostulacion &&
              hoy >= sol.fechaInicioPostulacion &&
              hoy <= sol.fechaFinPostulacion
            );

            if (
              sol.estado === "Aprobado" &&
              sol.postulacionActiva === true &&
              sol.postulacionCerrada !== true &&
              dentroDeRango
            ) {
                select.innerHTML += `
                    <option value="${index}">${sol.numero}</option>`;
            }
        });
    }

    function guardarPostulacion() {

      solicitudIndex = document.getElementById("selectSolicitud").value;

      if (!solicitudIndex) {
          alert("Debe seleccionar una solicitud habilitada.");
          return;
      }

      const cedulaVal = cedula.value.trim();
      const nombreVal = nombre.value.trim();
      const fechaNVal = fechaNacimiento.value;
      const correoVal = correo.value.trim();
      const telefonoVal = telefono.value.trim();
      const aspiracionVal = aspiracion.value.trim();
      const cvFile = cv.files[0];
      const infoAdicionalVal = document.getElementById("infoAdicional").value.trim(); // ⭐ nuevo

      // Validaciones obligatorias
      if (!cedulaVal || !nombreVal || !fechaNVal || !correoVal || !telefonoVal || !aspiracionVal || !cvFile) {
          alert("⚠ Complete todos los campos obligatorios.");
          return;
      }

      if (cedulaVal.length !== 10 || isNaN(cedulaVal)) {
          alert("⚠ La cédula debe tener 10 dígitos numéricos.");
          return;
      }

      if (!correoVal.includes("@")) {
          alert("⚠ Correo inválido.");
          return;
      }

      if (telefonoVal.length < 10 || isNaN(telefonoVal)) {
          alert("⚠ Teléfono inválido.");
          return;
      }

      if (isNaN(aspiracionVal) || aspiracionVal <= 0) {
          alert("⚠ Aspiración salarial inválida.");
          return;
      }

      if (cvFile.type !== "application/pdf") {
          alert("⚠ Solo se aceptan archivos PDF.");
          return;
      }

      // Verificar duplicados
      const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
      const solicitud = lista[solicitudIndex];

      if (solicitud.candidatos && solicitud.candidatos.some(c => c.cedula === cedulaVal)) {
          alert("⚠ Tu postulación ya ha sido registrada.");
          return;
      }

      const fileURL = URL.createObjectURL(cvFile);

      const candidato = {
          cedula: cedulaVal,
          nombre: nombreVal,
          fechaNacimiento: fechaNVal,
          correo: correoVal,
          telefono: telefonoVal,
          aspiracion: aspiracionVal,
          infoAdicional: infoAdicionalVal, // ⭐ Guardado de campo opcional
          cv: fileURL,
          cvNombre: cvFile.name,
          estado: "pendiente"
      };

      if (!solicitud.candidatos) solicitud.candidatos = [];
      solicitud.candidatos.push(candidato);

      localStorage.setItem("solicitudes", JSON.stringify(lista));

      // Mostrar mensaje final
      document.getElementById("formularioCard").style.display = "none";
      document.getElementById("mensajeFinal").style.display = "block";

    }

    window.onload = cargarSolicitudesHabilitadas;

  </script>

  <script src="../../assets/js/ui-shell.js"></script>
</body>
</html>
