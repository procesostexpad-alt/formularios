<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>8. Ingreso de Personal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  table th, table td {
    text-align: center;
    vertical-align: middle !important;
  }

  .readonly { background-color: #e9ecef !important; }

  .verde { background-color: #d4f5d2 !important; }
  .amarillo { background-color: #fff7c2 !important; }

  /* ------------------------------
     🔧 Correcciones de diseño
  ------------------------------ */

  /* Select de postulante */
  td select.postulante {
    min-width: 130px !important;
  }

  /* Select Acción */
  td select.accion {
    min-width: 120px !important;
  }

  /* Motivo No Ingreso */
  td .motivoNoIngreso {
    min-width: 200px !important;
  }

  /* Fecha de Ingreso */
  td .fechaIngreso {
    min-width: 150px !important;
    text-align: center !important;
  }

  /* Código Único */
  td .codigoUnico {
    width: 120px !important;
    text-align: center !important;
  }

</style>
  <link rel="stylesheet" href="../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../assets/css/ui-shell.css">
</head>

<body class="bg-light p-4">

<div class="container">
  <h3 class="mb-4">Ingreso de Personal</h3>

  <table class="table table-bordered table-hover align-middle">
    <thead class="table-secondary">
      <tr>
        <th>N° Solicitud</th>
        <th>Fecha Solicitud</th>
        <th>Solicitante</th>
        <th>Área</th>
        <th>Cargo</th>
        <th>Nombre Postulante</th>
        <th>Cédula</th>
        <th>Fecha Estimada</th>
        <th>Aptitud Médica</th>
        <th>Postulante</th>
        <th>Fecha de Ingreso</th>
        <th>Código Único</th>
        <th>Acción</th>
        <th>Motivo No Ingreso</th>
        <th>Guardar</th>
      </tr>
    </thead>
    <tbody id="tablaIngreso"></tbody>
  </table>
</div>

<script>

// ======================================================
//   CARGAR SOLO APTO y APTO CON OBSERVACIÓN
// ======================================================
function cargarIngresoPersonal() {

    const tabla = document.getElementById("tablaIngreso");
    tabla.innerHTML = "";

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");

    lista.forEach(sol => {

        if (!sol.candidatos) return;

        sol.candidatos
            .filter(c =>
                (c.aptitudMedica === "APTO" || c.aptitudMedica === "APTO CON OBSERVACIÓN") &&
                !c.faseIngresoCompletada
            )
            .forEach(c => {

                let colorClass = (c.aptitudMedica === "APTO") ? "verde" : "amarillo";

                const row = document.createElement("tr");

                row.innerHTML = `
                    <td class="readonly">${sol.numero}</td>
                    <td class="readonly">${sol.fechaSolicitud}</td>
                    <td class="readonly">${sol.solicitante}</td>
                    <td class="readonly">${sol.area}</td>
                    <td class="readonly">${sol.cargoSolicitado}</td>

                    <td class="readonly">${c.nombre}</td>
                    <td class="readonly">${c.cedula}</td>
                    <td class="readonly">${sol.fechaIngreso || "N/A"}</td>

                    <td class="readonly ${colorClass}">${c.aptitudMedica}</td>

                    <td>
                      <select class="form-select postulante" onchange="controlarCampos(this)">
                        <option value="">Seleccione...</option>
                        <option ${c.ingreso === "INGRESO" ? "selected" : ""}>INGRESO</option>
                        <option ${c.ingreso === "NO INGRESO" ? "selected" : ""}>NO INGRESO</option>
                      </select>
                    </td>

                    <td>
                      <input type="date" class="form-control fechaIngreso" value="${c.fechaIngreso || ""}">
                    </td>

                    <td>
                      <input type="number" class="form-control codigoUnico"
                        value="${c.codigoUnico || ""}"
                        max="99999"
                        oninput="if(this.value.length>5)this.value=this.value.slice(0,5);">
                    </td>

                    <td>
                      <select class="form-select accion">
                        <option value="">Seleccione...</option>
                        <option>ABIERTO</option>
                        <option>CERRADO</option>
                        <option>REPROCESO</option>
                      </select>
                    </td>

                    <td>
                      <input type="text" class="form-control motivoNoIngreso" placeholder="Motivo..." disabled>
                    </td>

                    <td>
                      <button class="btn btn-success" onclick="guardarFila(this)">💾</button>
                    </td>
                `;

                tabla.appendChild(row);
                controlarCampos(row.querySelector(".postulante"));
            });
    });
}



// ======================================================
// HABILITAR / BLOQUEAR CAMPOS
// ======================================================
function controlarCampos(select) {

    const row = select.closest("tr");

    const fechaIngreso = row.querySelector(".fechaIngreso");
    const codigoUnico = row.querySelector(".codigoUnico");
    const accion = row.querySelector(".accion");
    const motivo = row.querySelector(".motivoNoIngreso");

    if (select.value === "INGRESO") {

        fechaIngreso.disabled = false;
        codigoUnico.disabled = false;

        motivo.disabled = true;
        motivo.value = "";

        accion.disabled = false;
        accion.innerHTML = `<option>ABIERTO</option>`;
        accion.value = "ABIERTO";
        return;
    }

    // ⭐ NO INGRESO
    fechaIngreso.disabled = true;
    fechaIngreso.value = "";

    codigoUnico.disabled = true;
    codigoUnico.value = "";

    motivo.disabled = false;

    accion.disabled = false;
    accion.innerHTML = `
        <option value="">Seleccione...</option>
        <option>CERRADO</option>
        <option>REPROCESO</option>
    `;
}



// ======================================================
// GUARDAR FILA
// ======================================================
// ======================================================
// GUARDAR FILA
// ======================================================
function guardarFila(btn) {

    const row = btn.closest("tr");

    const numeroSolicitud = row.cells[0].textContent;
    const cedula = row.cells[6].textContent;

    const ingreso = row.querySelector(".postulante").value;
    const fechaIngreso = row.querySelector(".fechaIngreso").value;
    const codigoUnico = row.querySelector(".codigoUnico").value;
    const accion = row.querySelector(".accion").value;
    const motivo = row.querySelector(".motivoNoIngreso").value.trim();

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const solicitud = lista.find(s => s.numero == numeroSolicitud);
    const candidato = solicitud.candidatos.find(c => c.cedula === cedula);

    if (ingreso === "") {
        alert("Debe seleccionar INGRESO o NO INGRESO.");
        return;
    }

    // ⭐ INGRESO
    if (ingreso === "INGRESO") {

        if (!fechaIngreso || !codigoUnico) {
            alert("Debe ingresar Fecha y Código Único.");
            return;
        }

        candidato.ingreso = "INGRESO";
        candidato.fechaIngreso = fechaIngreso;
        candidato.codigoUnico = codigoUnico;
        candidato.accion = "ABIERTO";
        candidato.faseIngresoCompletada = true;

        // Registra la etapa en el historial de la solicitud
        const fechaLocalEcuador = new Date().toLocaleString("es-EC", { timeZone: "America/Guayaquil" });
        if (!solicitud.historialEtapas) {
            solicitud.historialEtapas = []; // Crear historial si no existe
        }

        solicitud.historialEtapas.push({
            etapa: "Ingreso Registrado",
            fecha: fechaLocalEcuador,
            usuario: "Nicolás Crisanto" // O el nombre del usuario logueado
        });

        // **Guardar el historial de etapas a nivel de Candidato**
        if (!candidato.historialEtapas) {
            candidato.historialEtapas = []; // Crear historial si no existe
        }

        candidato.historialEtapas.push({
            etapa: "Ingreso Registrado",
            fecha: fechaLocalEcuador,
            usuario: "Nicolás Crisanto" // O el nombre del usuario logueado
        });

        localStorage.setItem("solicitudes", JSON.stringify(lista));

        alert("🟢 INGRESO REGISTRADO.");
        row.remove();
        return;
    }

    // ⭐ NO INGRESO — Motivo obligatorio
    if (ingreso === "NO INGRESO") {

        if (motivo === "") {
            alert("Debe ingresar el motivo del NO INGRESO.");
            return;
        }

        candidato.motivoNoIngreso = motivo;
        candidato.ingreso = "NO INGRESO";
        candidato.accion = accion;
        candidato.faseIngresoCompletada = true;

        // Registra la etapa en el historial de la solicitud
        const fechaLocalEcuador = new Date().toLocaleString("es-EC", { timeZone: "America/Guayaquil" });
        if (!solicitud.historialEtapas) {
            solicitud.historialEtapas = []; // Crear historial si no existe
        }

        solicitud.historialEtapas.push({
            etapa: "Ingreso No Aceptado",
            fecha: fechaLocalEcuador,
            usuario: "Nicolás Crisanto" // O el nombre del usuario logueado
        });

        // **Guardar el historial de etapas a nivel de Candidato**
        if (!candidato.historialEtapas) {
            candidato.historialEtapas = []; // Crear historial si no existe
        }

        candidato.historialEtapas.push({
            etapa: "Ingreso No Aceptado",
            fecha: fechaLocalEcuador,
            usuario: "Nicolás Crisanto" // O el nombre del usuario logueado
        });

        if (accion === "REPROCESO") {
            solicitud.seleccionFinalizada = false;
            candidato.estado = "reproceso";
        }

        localStorage.setItem("solicitudes", JSON.stringify(lista));

        alert("🔴 NO INGRESO REGISTRADO.");
        row.remove();
        return;
    }

    alert("⚠ Seleccione una acción válida.");
}



window.onload = cargarIngresoPersonal;
</script>

  <script src="../../assets/js/ui-shell.js"></script>
</body>
</html>
