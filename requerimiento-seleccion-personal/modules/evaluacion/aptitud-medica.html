<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>7. Revisión de Aptitud Médica</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  table th, table td {
    text-align: center;
    vertical-align: middle;
  }
  .verde { background-color: #d4f5d2 !important; }
  .amarillo { background-color: #fff7c2 !important; }
  .rojo { background-color: #ffd6d6 !important; }
</style>
  <link rel="stylesheet" href="../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../assets/css/ui-shell.css">
</head>

<body class="bg-light p-4">

<div class="container">
  <h3 class="mb-4">Revisión de Aptitud Médica</h3>

  <table class="table table-bordered table-hover align-middle">
    <thead class="table-secondary">
      <tr>
        <th>N° Solicitud</th>
        <th>Fecha de Solicitud</th>
        <th>Solicitante</th>
        <th>Área</th>
        <th>Cargo</th>
        <th>Nombre de Postulante</th>
        <th>Cédula</th>
        <th>Fecha Estimada de Ingreso</th>
        <th>Estado Actual</th>
        <th>Aptitud Médica</th>
        <th>Guardar</th>
      </tr>
    </thead>

    <tbody id="tablaAptitud"></tbody>

  </table>
</div>

<script>

function normalizarTexto(valor) {
  return String(valor || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim()
    .toUpperCase();
}

function obtenerEstadoPeriodo(candidato) {
  return normalizarTexto(
    candidato?.periodoEstado ||
    candidato?.estadoPeriodo ||
    candidato?.periodo_prueba_estado
  );
}

function obtenerResultadoPeriodo(candidato) {
  return normalizarTexto(
    candidato?.periodoAptitudFinal ||
    candidato?.resultadoPeriodoPrueba ||
    candidato?.aptitudPeriodoPrueba
  );
}

function aptitudMedicaFinalizada(candidato, enFlujoDesdePeriodo = false) {
  if (candidato?.aptitudMedicaProcesada === true) return true;

  const estado = normalizarTexto(candidato?.estado);
  if (estado === "APTO" || estado === "APTO_OBSERVACION" || estado === "NO_APTO") return true;

  // Si viene de periodo de prueba cerrado + apto, mostramos la fila
  // aunque exista un texto antiguo en aptitudMedica.
  if (enFlujoDesdePeriodo) return false;

  const aptitud = normalizarTexto(candidato?.aptitudMedica);
  return aptitud === "APTO" || aptitud === "APTO CON OBSERVACION" || aptitud === "NO APTO";
}

// ⭐ Cargar candidatos oficializados desde localStorage
function cargarAptitudes() {

    const tabla = document.getElementById("tablaAptitud");
    tabla.innerHTML = "";

    const lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    let totalFilas = 0;

    lista.forEach((sol, solIndex) => {
        const candidatosAptosPeriodo = (sol.candidatos || []).filter(c => {
            const estadoPeriodo = obtenerEstadoPeriodo(c);
            const periodoCerrado =
              estadoPeriodo === "CERRADO" ||
              estadoPeriodo === "FINALIZADO";

            const resultadoPeriodo = obtenerResultadoPeriodo(c);
            const estadoCandidato = normalizarTexto(c?.estado);
            const aptoPeriodo =
              resultadoPeriodo === "APTO" ||
              resultadoPeriodo === "APTO CON OBSERVACION" ||
              estadoCandidato === "APROBADO_PERIODO_PRUEBA";

            const enFlujoDesdePeriodo = periodoCerrado && aptoPeriodo;
            return enFlujoDesdePeriodo && !aptitudMedicaFinalizada(c, enFlujoDesdePeriodo);
        });

        if (candidatosAptosPeriodo.length === 0) return;

        candidatosAptosPeriodo.forEach(c => {
            totalFilas += 1;

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${sol.numero}</td>
                <td>${sol.fechaSolicitud}</td>
                <td>${sol.solicitante}</td>
                <td>${sol.area}</td>
                <td>${sol.cargoSolicitado}</td>
                <td>${c.nombre}</td>
                <td>${c.cedula}</td>
                <td>${c.fechaIngreso || sol.fechaIngreso || "N/A"}</td>

                <td><strong>APROBO PERIODO DE PRUEBA</strong></td>

                <td>
                  <select class="form-select aptitud" onchange="colorearFila(this)">
                    <option value="">Seleccione...</option>
                    <option value="apto">APTO</option>
                    <option value="apto_observacion">APTO CON OBSERVACIÓN</option>
                    <option value="no_apto">NO APTO</option>
                  </select>
                </td>

                <td>
                  <button class="btn btn-success" onclick="guardarNotificacion(this, ${solIndex}, '${c.cedula}')">💾</button>
                </td>
            `;

            tabla.appendChild(row);
        });
    });

    if (totalFilas === 0) {
      tabla.innerHTML = `
        <tr>
          <td colspan="11" class="text-center text-muted py-4">
            No hay candidatos listos para revision de aptitud medica. Deben estar en periodo de prueba: CERRADO y APTO.
          </td>
        </tr>
      `;
    }
}


// ⭐ Cambiar color al seleccionar
function colorearFila(select) {
  const row = select.closest("tr");

  row.classList.remove("verde", "amarillo", "rojo");

  if (select.value === "apto") row.classList.add("verde");
  else if (select.value === "apto_observacion") row.classList.add("amarillo");
  else if (select.value === "no_apto") row.classList.add("rojo");
}


// ⭐ Guardar Aptitud + mover de etapa
function guardarNotificacion(btn, solIndex, cedula) {

  const row = btn.closest("tr");
  const select = row.querySelector(".aptitud");

  if (!select.value) {
    alert("⚠ Debe seleccionar una opción de Aptitud Médica.");
    return;
  }

  let lista = JSON.parse(localStorage.getItem("solicitudes") || "[]");
  let solicitud = lista[solIndex];
  if (!solicitud) return;

  let candidato = solicitud.candidatos.find(c => String(c.cedula) === String(cedula));
  if (!candidato) return;

  let mensaje = "";
  let aptitudAprobada = false;

  // ⭐ APTO
  if (select.value === "apto") {
    candidato.estado = "apto";
    candidato.aptitudMedica = "APTO";
    candidato.aptitudMedicaProcesada = true;

    mensaje =
      `🟢 Postulante ${candidato.nombre} marcado como APTO.\n\n` +
      "📧 Notificado a TH.\n📧 Notificado SSOMA.\n📧 Notificado al Postulante.";

    aptitudAprobada = true;
  }

  // ⭐ APTO CON OBSERVACIÓN
  if (select.value === "apto_observacion") {
    candidato.estado = "apto_observacion";
    candidato.aptitudMedica = "APTO CON OBSERVACIÓN";
    candidato.aptitudMedicaProcesada = true;

    mensaje =
      `🟡 Postulante ${candidato.nombre} marcado como APTO CON OBSERVACIÓN.\n\n` +
      "📧 Notificado a TH.\n📧 Notificado SSOMA.\n📧 Notificado al Postulante.";

    aptitudAprobada = true;
  }

  // ⭐ NO APTO → vuelve a 2.2
  if (select.value === "no_apto") {
    candidato.estado = "postulado"; // vuelve a 2.2
    candidato.aptitudMedica = "NO APTO";
    candidato.aptitudMedicaProcesada = true;

    mensaje =
      `🔴 Postulante ${candidato.nombre} marcado como NO APTO.\n\n` +
      "📧 Notificado al Postulante.\n📧 Notificado a TH.\n📧 Notificado SSOMA.";

    aptitudAprobada = false;
  }

  // Agregar al historial de etapas de la solicitud
  const fechaLocalEcuador = new Date().toLocaleString("es-EC", { timeZone: "America/Guayaquil" });
  const etapaActual = select.value === "apto" ? "Aptitud-Medica-Apto" : (select.value === "apto_observacion" ? "Apto-con-observación" : "No Apto");

  // Registrar la etapa en el historial de la solicitud
  if (!solicitud.historialEtapas) {
    solicitud.historialEtapas = []; // Crear historial si no existe
  }

  solicitud.historialEtapas.push({
    etapa: etapaActual,
    fecha: fechaLocalEcuador,
    usuario: "Nicolás Crisanto" // O cualquier variable que contenga el nombre del usuario
  });

  // **Guardar el historial de etapas a nivel de Candidato**
  if (!candidato.historialEtapas) {
    candidato.historialEtapas = []; // Crear historial si no existe
  }

  candidato.historialEtapas.push({
    etapa: etapaActual,
    fecha: fechaLocalEcuador,
    usuario: "Nicolás Crisanto" // O cualquier variable que contenga el nombre del usuario
  });

  // Guardar la solicitud con el historial actualizado
  localStorage.setItem("solicitudes", JSON.stringify(lista));

  alert(mensaje);

  // ❗ SIEMPRE remover visualmente
  row.remove();

  if (aptitudAprobada) {
    alert("Continua con Entrega de Dotacion Completa si aplica; luego pasa a Ingreso de Personal.");
  }
}


// Inicializar
cargarAptitudes();

</script>

  <script src="../../assets/js/ui-shell.js"></script>
</body>
</html>
