<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>9.2. Entrega de Dotacion Completa</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  table th, table td { text-align: center; vertical-align: middle; }
  .readonly { background: #ececec !important; }
  .estado-ok { background: #198754 !important; color: white !important; font-weight: bold; }
  .estado-alerta { background: #dc3545 !important; color: white !important; font-weight: bold; }
</style>
  <link rel="stylesheet" href="../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../assets/css/ui-shell.css">
</head>

<body class="bg-light p-4">

<div class="container">
  <h3 class="mb-4 text-center">Entrega de Dotacion Completa</h3>

  <table class="table table-bordered table-hover align-middle">
    <thead class="table-secondary">
      <tr>
        <th>N° Solicitud</th>
        <th>Fecha Solicitud</th>
        <th>Solicitante</th>
        <th>Area</th>
        <th>Cargo</th>
        <th>Nombre</th>
        <th>Cedula</th>
        <th>Codigo Trabajador</th>
        <th>Estado PP</th>
        <th>Aptitud Medica</th>
        <th>Entrega Basica</th>
        <th>Entrega Completa</th>
        <th>Guardar</th>
        <th>Ver</th>
      </tr>
    </thead>
    <tbody id="tablaDotacionCompleta"></tbody>
  </table>
</div>

<script>
function normalizarTexto(valor) {
  return String(valor || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function esSi(valor) {
  return normalizarTexto(valor) === "si";
}

function tieneTextoValido(valor) {
  const texto = normalizarTexto(valor);
  return !!texto && !texto.includes("no aplica");
}

function requiereDotacionEpp(sol) {
  const flagExplicito =
    esSi(sol?.requiereDotacion) ||
    esSi(sol?.requiereEpp) ||
    esSi(sol?.requiereUniforme) ||
    esSi(sol?.requiereDotacionEpp) ||
    esSi(sol?.requiereEppsUniformes);

  if (flagExplicito) return true;

  const detalleFicha = Array.isArray(sol?.manualCargoDetalle?.ficha?.eppsUniformesDetalle)
    ? sol.manualCargoDetalle.ficha.eppsUniformesDetalle
    : [];

  if (detalleFicha.length > 0) {
    return detalleFicha.some(item => {
      const tipo = normalizarTexto(item?.tipo);
      const elemento = normalizarTexto(item?.elemento);
      const cantidad = Number.parseInt(String(item?.cantidad ?? "").trim(), 10) || 0;
      return !!tipo && !!elemento && cantidad > 0 && !tipo.includes("no aplica") && !elemento.includes("no aplica");
    });
  }

  if (tieneTextoValido(sol?.manualCargoDetalle?.ficha?.eppsUniformes)) return true;
  if (tieneTextoValido(sol?.eppsUniformes)) return true;

  return false;
}

function induccionCompletaCandidato(candidato) {
  if (candidato?.induccionCompleta === true) return true;
  const induccion = candidato?.induccion;
  if (!induccion || typeof induccion !== "object") return false;

  const completo = modulo => {
    if (!modulo || typeof modulo !== "object") return false;
    if (modulo.completada === true) return true;
    return Array.isArray(modulo.items) && modulo.items.length > 0;
  };

  return completo(induccion.th) && completo(induccion.ssoma) && completo(induccion.puesto);
}

function aptitudMedicaAprobada(candidato) {
  const aptitud = normalizarTexto(candidato?.aptitudMedica);
  return aptitud === "apto" || aptitud === "apto con observacion";
}

function cargarDotacionCompleta() {
  const tabla = document.getElementById("tablaDotacionCompleta");
  tabla.innerHTML = "";

  const solicitudes = JSON.parse(localStorage.getItem("solicitudes") || "[]");

  solicitudes.forEach((sol, solIndex) => {
    if (!requiereDotacionEpp(sol)) return;

    (Array.isArray(sol.candidatos) ? sol.candidatos : [])
      .filter(candidato => {
        if (!induccionCompletaCandidato(candidato)) return false;
        const estadoPP = String(candidato.periodoEstado || "ABIERTO").toUpperCase();
        return estadoPP === "CERRADO" && aptitudMedicaAprobada(candidato) && !candidato.faseIngresoCompletada;
      })
      .forEach(candidato => {
        const estadoPP = String(candidato.periodoEstado || "").toUpperCase();
        const aptitudMedica = String(candidato.aptitudMedica || "");
        const basica = String(candidato.entregaBasica || "").toUpperCase();

        const tieneBasicaLista = basica === "ENTREGADO" || basica === "NO APLICA";
        const bloqueoCompleta = candidato.bloqueoCompleta === true;
        const disableCompleta = bloqueoCompleta || !tieneBasicaLista ? "disabled" : "";

        let opcionesEntregaCompleta = "";
        if (!tieneBasicaLista) {
          opcionesEntregaCompleta = "<option value=\"\">Primero registrar entrega basica</option>";
        } else {
          opcionesEntregaCompleta = `
            <option value="">Seleccione...</option>
            <option ${candidato.entregaCompleta === "ENTREGADO" ? "selected" : ""}>ENTREGADO</option>
            <option ${candidato.entregaCompleta === "ENTREGADO INCOMPLETO" ? "selected" : ""}>ENTREGADO INCOMPLETO</option>
            <option ${candidato.entregaCompleta === "NO APLICA" ? "selected" : ""}>NO APLICA</option>
          `;
        }

        const row = document.createElement("tr");
        row.dataset.solIndex = String(solIndex);
        row.dataset.cedula = String(candidato.cedula || "");
        row.dataset.puedeGuardar = String(tieneBasicaLista && !bloqueoCompleta);

        row.innerHTML = `
          <td class="readonly">${sol.numero || ""}</td>
          <td class="readonly">${sol.fechaSolicitud || ""}</td>
          <td class="readonly">${sol.solicitante || ""}</td>
          <td class="readonly">${sol.area || ""}</td>
          <td class="readonly">${sol.cargoSolicitado || ""}</td>
          <td class="readonly">${candidato.nombre || ""}</td>
          <td class="readonly">${candidato.cedula || ""}</td>
          <td class="readonly">${candidato.codigoUnico || ""}</td>
          <td class="readonly">${estadoPP}</td>
          <td class="readonly ${aptitudMedicaAprobada(candidato) ? "estado-ok" : "estado-alerta"}">${aptitudMedica || "PENDIENTE"}</td>
          <td class="readonly ${tieneBasicaLista ? "estado-ok" : "estado-alerta"}">${basica || "SIN REGISTRO"}</td>
          <td>
            <select class="form-select entregaCompleta" ${disableCompleta}>
              ${opcionesEntregaCompleta}
            </select>
          </td>
          <td><button class="btn btn-success" onclick="guardarFilaCompleta(this)">Guardar</button></td>
          <td><button class="btn btn-info" onclick="abrirInfoDotacion(${solIndex}, '${String(candidato.cedula || "")}')">Ver</button></td>
        `;

        tabla.appendChild(row);
      });
  });
}

function guardarFilaCompleta(btn) {
  const row = btn.closest("tr");
  if (!row) return;

  if (row.dataset.puedeGuardar !== "true") {
    alert("Para entrega completa primero se requiere entrega basica (ENTREGADO o NO APLICA).");
    return;
  }

  const solIndex = Number(row.dataset.solIndex);
  const cedula = String(row.dataset.cedula || "");

  const selectorCompleta = row.querySelector(".entregaCompleta");
  if (!selectorCompleta || selectorCompleta.disabled) {
    alert("La entrega completa ya se encuentra bloqueada para este candidato.");
    return;
  }

  const entregaCompleta = selectorCompleta.value;
  if (!entregaCompleta) {
    alert("Seleccione un estado para la entrega completa.");
    return;
  }

  const solicitudes = JSON.parse(localStorage.getItem("solicitudes") || "[]");
  const sol = solicitudes[solIndex];
  if (!sol || !Array.isArray(sol.candidatos)) return;

  const candidato = sol.candidatos.find(c => String(c.cedula || "") === cedula);
  if (!candidato) return;

  candidato.entregaCompleta = entregaCompleta;

  if (
    entregaCompleta === "ENTREGADO" ||
    entregaCompleta === "ENTREGADO INCOMPLETO" ||
    entregaCompleta === "NO APLICA"
  ) {
    candidato.bloqueoCompleta = true;
  }

  localStorage.setItem("solicitudes", JSON.stringify(solicitudes));

  if (entregaCompleta === "ENTREGADO") {
    alert("Entrega completa registrada. Notificacion enviada a solicitante y Talento Humano.");
  } else if (entregaCompleta === "ENTREGADO INCOMPLETO") {
    alert("Entrega completa registrada como incompleta. Notificacion enviada.");
  } else {
    alert("Entrega completa marcada como NO APLICA.");
  }

  alert("Informacion guardada correctamente.");
  cargarDotacionCompleta();
}

function abrirInfoDotacion(solIndex, cedula) {
  window.location.href = `../gestion/solicitudes/ver-solicitud-ssoma.html?sol=${solIndex}&ced=${cedula}`;
}

document.addEventListener("DOMContentLoaded", cargarDotacionCompleta);
</script>

<script src="../../assets/js/ui-shell.js"></script>
</body>
</html>
