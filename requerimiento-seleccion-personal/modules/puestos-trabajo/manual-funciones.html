<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual de Funciones por Cargo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .page-wrap {
      max-width: 1260px;
      margin: 0 auto;
      padding: 20px 12px 30px;
    }

    .head-card {
      border: 1px solid #d4e0db;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 12px 26px rgba(22, 52, 44, 0.08);
      padding: 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .head-card h1 {
      margin: 0;
      font-size: 1.35rem;
      color: #0f5f4e;
      font-weight: 700;
    }

    .head-card p {
      margin: 4px 0 0;
      color: #5f7075;
      font-size: 0.92rem;
    }

    .badge-estado {
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.25px;
    }

    .badge-completo {
      background: #d9f2e6;
      color: #0f5f4e;
      border: 1px solid #9ccfb6;
    }

    .badge-incompleto {
      background: #fff0d6;
      color: #8a4b00;
      border: 1px solid #e8c48a;
    }
  </style>
  <link rel="stylesheet" href="../../assets/css/global-theme.css">
  <link rel="stylesheet" href="../../assets/css/ui-shell.css">
</head>
<body>
  <main class="page-wrap">
    <section class="head-card">
      <div>
        <h1>Manual de Funciones</h1>
        <p>Parametrizacion por cargo. Selecciona editar para completar o actualizar la ficha.</p>
      </div>
    </section>

    <section class="container">
      <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
          <thead class="table-secondary">
            <tr>
              <th>#</th>
              <th>Codigo cargo</th>
              <th>Nombre cargo</th>
              <th>Area</th>
              <th>Departamento</th>
              <th>Fuente</th>
              <th>Estado ficha</th>
              <th>Accion</th>
            </tr>
          </thead>
          <tbody id="tablaManuales"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "manualFuncionesCargos";
    const CAMPOS_FICHA = ["objetivo", "funciones", "perfil", "competencias", "indicadoresKpis"];

    const CARGOS_EJEMPLO = [
      {
        codigoCargo: "TP-ASIST",
        nombreCargo: "Asistente de procesos",
        area: "Operaciones",
        departamento: "Procesos",
        tipoCargo: "operativo",
        horario: "Administrativo",
        horarioCompleto: "",
        edadSugerida: "22-35",
        sexoSugerido: "Irrelevante",
        bandaSalarial: "950 USD",
        quienReporta: "Jefatura de Operaciones | Gerencia de Operaciones",
        quienReportaLista: ["Jefatura de Operaciones", "Gerencia de Operaciones"],
        quienSupervisa: "Asistente | Operario",
        quienSupervisaLista: ["Asistente", "Operario"],
        ficha: {
          objetivo: "Apoyar la ejecucion y control de actividades del area.",
          funciones: "Registrar informacion, apoyar reportes y seguimiento de tareas.",
          perfil: "Tecnologo o profesional junior en procesos o afines.",
          competencias: "Orden, trabajo en equipo, orientacion a resultados."
        }
      },
      {
        codigoCargo: "TP-COORD",
        nombreCargo: "Coordinador de procesos",
        area: "Operaciones",
        departamento: "Procesos",
        tipoCargo: "administrativo",
        horario: "otros",
        horarioCompleto: "08:00-17:00",
        edadSugerida: "30-45",
        sexoSugerido: "Irrelevante",
        bandaSalarial: "1400 USD",
        quienReporta: "",
        quienReportaLista: [],
        quienSupervisa: "",
        quienSupervisaLista: [],
        ficha: {
          objetivo: "",
          funciones: "",
          perfil: "",
          competencias: ""
        }
      },
      {
        codigoCargo: "TP-ANALI",
        nombreCargo: "Analista de talento humano",
        area: "Gestion",
        departamento: "Talento Humano",
        tipoCargo: "administrativo",
        horario: "Administrativo",
        horarioCompleto: "",
        edadSugerida: "25-40",
        sexoSugerido: "Irrelevante",
        bandaSalarial: "1250 USD",
        quienReporta: "",
        quienReportaLista: [],
        quienSupervisa: "",
        quienSupervisaLista: [],
        ficha: {
          objetivo: "Gestionar procesos de seleccion e incorporacion.",
          funciones: "",
          perfil: "Profesional en psicologia o administracion.",
          competencias: "Comunicacion, criterio y analisis."
        }
      },
      {
        codigoCargo: "TP-TECSI",
        nombreCargo: "Tecnico de sistemas",
        area: "Evaluacion",
        departamento: "Sistemas",
        tipoCargo: "operativo",
        horario: "Produccionf",
        horarioCompleto: "",
        edadSugerida: "20-35",
        sexoSugerido: "Irrelevante",
        bandaSalarial: "1100 USD",
        quienReporta: "",
        quienReportaLista: [],
        quienSupervisa: "",
        quienSupervisaLista: [],
        ficha: {
          objetivo: "",
          funciones: "Configurar accesos, soporte y entrega de equipos.",
          perfil: "",
          competencias: ""
        }
      }
    ];

    const QUIEN_REPORTA_OPCIONES = [
      "Gerencia General",
      "Gerencia de Operaciones",
      "Gerencia Comercial",
      "Gerencia Administrativo Financiero",
      "Jefatura de Operaciones",
      "Jefatura de Produccion",
      "Jefatura de SSOMA",
      "Jefatura de Procesos",
      "Jefatura de Calidad",
      "Jefatura de Mantenimiento",
      "Jefatura de Logistica",
      "Jefatura de Talento Humano",
      "Coordinador de Area"
    ];

    const QUIEN_SUPERVISA_OPCIONES = [
      "Coordinador",
      "Supervisor",
      "Analista",
      "Asistente",
      "Auxiliar",
      "Tecnico",
      "Operario",
      "Especialista",
      "Practicante",
      "Pasante"
    ];

    function obtenerLista() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function guardarLista(lista) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
    }

    function normalizarTexto(valor) {
      return String(valor || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function textoSeguro(valor) {
      return String(valor || "").trim();
    }

    function valorCatalogado(lista, valor) {
      const limpio = textoSeguro(valor);
      if (!limpio) return "";
      const normalizado = normalizarTexto(limpio);
      return (Array.isArray(lista) ? lista : []).find(item => normalizarTexto(item) === normalizado) || "";
    }

    function normalizarListaCatalogada(opciones, valor) {
      const origen = Array.isArray(valor)
        ? valor
        : textoSeguro(valor)
          .split(/\||,|;/)
          .map(item => textoSeguro(item))
          .filter(Boolean);
      const unicos = new Set();
      origen.forEach(item => {
        const valido = valorCatalogado(opciones, item);
        if (valido) unicos.add(valido);
      });
      return Array.from(unicos);
    }

    function serializarListaCatalogada(lista) {
      return (Array.isArray(lista) ? lista : [])
        .map(item => textoSeguro(item))
        .filter(Boolean)
        .join(" | ");
    }

    function normalizarFilaPerfil(item) {
      return {
        formacionAcademica: textoSeguro(item?.formacionAcademica),
        tipo: textoSeguro(item?.tipo),
        titulo: textoSeguro(item?.titulo)
      };
    }

    function normalizarFilaCompetencia(item) {
      return {
        tipo: textoSeguro(item?.tipo),
        competencia: textoSeguro(item?.competencia),
        subcategoria: textoSeguro(item?.subcategoria)
      };
    }

    function normalizarFilaCapacitacion(item) {
      return {
        tipo: textoSeguro(item?.tipo),
        detalle: textoSeguro(item?.detalle)
      };
    }

    function normalizarFilaRecurso(item) {
      return {
        tipo: textoSeguro(item?.tipo),
        recurso: textoSeguro(item?.recurso),
        observacion: textoSeguro(item?.observacion)
      };
    }

    function normalizarFilaDotacion(item) {
      const cantidadRaw = String(item?.cantidad ?? "").trim();
      const cantidadNum = Number.parseInt(cantidadRaw, 10);
      return {
        tipo: textoSeguro(item?.tipo),
        elemento: textoSeguro(item?.elemento),
        cantidad: Number.isInteger(cantidadNum) && cantidadNum > 0 ? cantidadNum : 0,
        observacion: textoSeguro(item?.observacion)
      };
    }

    function normalizarFilaKpi(item) {
      return {
        indicador: textoSeguro(item?.indicador),
        formula: textoSeguro(item?.formula)
      };
    }

    function listaRecursosValida(lista) {
      return Array.isArray(lista)
        && lista.length > 0
        && lista.every(item => textoSeguro(item?.tipo) && textoSeguro(item?.recurso) && textoSeguro(item?.observacion));
    }

    function listaDotacionValida(lista) {
      return Array.isArray(lista)
        && lista.length > 0
        && lista.every(item => {
          const cantidad = Number.parseInt(String(item?.cantidad ?? "").trim(), 10);
          return textoSeguro(item?.tipo)
            && textoSeguro(item?.elemento)
            && Number.isInteger(cantidad)
            && cantidad > 0
            && textoSeguro(item?.observacion);
        });
    }

    function listaKpisValida(lista) {
      return Array.isArray(lista)
        && lista.length > 0
        && lista.every(item => textoSeguro(item?.indicador) && textoSeguro(item?.formula));
    }

    function soloLetras(valor) {
      return String(valor || "")
        .toUpperCase()
        .replace(/[^A-Z]/g, "");
    }

    function referenciaCargo5(nombreCargo) {
      const letras = normalizarTexto(nombreCargo)
        .replace(/[^a-z]/g, "")
        .toUpperCase();

      return letras.slice(0, 5).padEnd(5, "X");
    }

    function codigoTpDesdeReferencia(ref5) {
      return `TP-${soloLetras(ref5).slice(0, 5).padEnd(5, "X")}`;
    }

    function codigoTpValido(codigoCargo) {
      return /^TP-[A-Z]{5}$/.test(String(codigoCargo || "").trim().toUpperCase());
    }

    function codigoTpSugerido(nombreCargo) {
      return codigoTpDesdeReferencia(referenciaCargo5(nombreCargo));
    }

    function asegurarCodigoUnico(codigo, usados, semilla = "AAAAA") {
      const inicial = codigoTpValido(codigo) ? String(codigo).trim().toUpperCase() : codigoTpDesdeReferencia(semilla);
      if (!usados.has(inicial)) return inicial;

      const base = inicial.slice(0, 6);
      const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      for (let i = 0; i < abc.length; i += 1) {
        const candidato = base + abc[i];
        if (!usados.has(candidato)) return candidato;
      }

      for (let i = 0; i < abc.length; i += 1) {
        for (let j = 0; j < abc.length; j += 1) {
          const candidato = `TP-${semilla.slice(0, 3)}${abc[i]}${abc[j]}`;
          if (!usados.has(candidato)) return candidato;
        }
      }

      return inicial;
    }

    function normalizarCargo(cargo, usados) {
      const quienReportaListaNormalizada = normalizarListaCatalogada(
        QUIEN_REPORTA_OPCIONES,
        cargo?.quienReportaLista ?? cargo?.quienReporta
      );
      const quienSupervisaListaNormalizada = normalizarListaCatalogada(
        QUIEN_SUPERVISA_OPCIONES,
        cargo?.quienSupervisaLista ?? cargo?.quienSupervisa
      );

      const limpio = {
        codigoCargo: String(cargo?.codigoCargo || "").trim().toUpperCase(),
        nombreCargo: String(cargo?.nombreCargo || "").trim(),
        area: String(cargo?.area || "").trim(),
        departamento: String(cargo?.departamento || "").trim(),
        justificacionCreacionCargo: textoSeguro(cargo?.justificacionCreacionCargo),
        tipoCargo: String(cargo?.tipoCargo || "").trim(),
        horario: String(cargo?.horario || "").trim(),
        horarioCompleto: String(cargo?.horarioCompleto || "").trim(),
        edadSugerida: String(cargo?.edadSugerida || "").trim(),
        sexoSugerido: String(cargo?.sexoSugerido || "").trim(),
        bandaSalarial: String(cargo?.bandaSalarial || "").trim(),
        quienReporta: serializarListaCatalogada(quienReportaListaNormalizada),
        quienReportaLista: quienReportaListaNormalizada,
        quienSupervisa: serializarListaCatalogada(quienSupervisaListaNormalizada),
        quienSupervisaLista: quienSupervisaListaNormalizada,
        ficha: {
          objetivo: textoSeguro(cargo?.ficha?.objetivo),
          funciones: textoSeguro(cargo?.ficha?.funciones),
          perfil: textoSeguro(cargo?.ficha?.perfil),
          competencias: textoSeguro(cargo?.ficha?.competencias),
          experienciaRequerida: textoSeguro(cargo?.ficha?.experienciaRequerida),
          capacitaciones: textoSeguro(cargo?.ficha?.capacitaciones),
          equiposAccesos: textoSeguro(cargo?.ficha?.equiposAccesos),
          eppsUniformes: textoSeguro(cargo?.ficha?.eppsUniformes),
          indicadoresKpis: textoSeguro(cargo?.ficha?.indicadoresKpis),
          perfilDetalle: Array.isArray(cargo?.ficha?.perfilDetalle)
            ? cargo.ficha.perfilDetalle.map(normalizarFilaPerfil).filter(item => item.formacionAcademica && item.tipo && item.titulo)
            : [],
          competenciasDetalle: Array.isArray(cargo?.ficha?.competenciasDetalle)
            ? cargo.ficha.competenciasDetalle.map(normalizarFilaCompetencia).filter(item => item.tipo && item.competencia && item.subcategoria)
            : [],
          capacitacionesDetalle: Array.isArray(cargo?.ficha?.capacitacionesDetalle)
            ? cargo.ficha.capacitacionesDetalle.map(normalizarFilaCapacitacion).filter(item => item.tipo && item.detalle)
            : [],
          equiposAccesosDetalle: Array.isArray(cargo?.ficha?.equiposAccesosDetalle)
            ? cargo.ficha.equiposAccesosDetalle.map(normalizarFilaRecurso).filter(item => item.tipo && item.recurso)
            : [],
          eppsUniformesDetalle: Array.isArray(cargo?.ficha?.eppsUniformesDetalle)
            ? cargo.ficha.eppsUniformesDetalle.map(normalizarFilaDotacion).filter(item => item.tipo && item.elemento)
            : [],
          indicadoresKpisDetalle: Array.isArray(cargo?.ficha?.indicadoresKpisDetalle)
            ? cargo.ficha.indicadoresKpisDetalle.map(normalizarFilaKpi).filter(item => item.indicador && item.formula)
            : []
        }
      };

      const codigoBase = codigoTpValido(limpio.codigoCargo)
        ? limpio.codigoCargo
        : codigoTpSugerido(limpio.nombreCargo);

      limpio.codigoCargo = asegurarCodigoUnico(codigoBase, usados, referenciaCargo5(limpio.nombreCargo));
      usados.add(limpio.codigoCargo);

      return limpio;
    }

    function asegurarData() {
      const actual = obtenerLista();
      const base = (Array.isArray(actual) && actual.length > 0)
        ? actual.map(item => ({ ...item }))
        : CARGOS_EJEMPLO.map(item => ({ ...item }));

      const usados = new Set();
      const normalizada = base.map(item => normalizarCargo(item, usados));

      guardarLista(normalizada);
      return normalizada;
    }

    function fichaCompleta(cargo) {
      if (!codigoTpValido(cargo?.codigoCargo)) return false;
      if (!cargo?.nombreCargo || !cargo?.area || !cargo?.departamento) return false;
      if (!cargo?.tipoCargo || !cargo?.horario || !cargo?.edadSugerida || !cargo?.sexoSugerido || !cargo?.bandaSalarial) return false;
      if (cargo.horario === "otros" && !String(cargo.horarioCompleto || "").trim()) return false;
      const ficha = cargo?.ficha || {};
      if (!textoSeguro(ficha.experienciaRequerida)) return false;
      if (!Array.isArray(ficha.perfilDetalle) || ficha.perfilDetalle.length === 0) return false;
      if (!Array.isArray(ficha.competenciasDetalle) || ficha.competenciasDetalle.length === 0) return false;
      if (!Array.isArray(ficha.capacitacionesDetalle) || ficha.capacitacionesDetalle.length === 0) return false;
      if (!listaRecursosValida(ficha.equiposAccesosDetalle)) return false;
      if (!listaDotacionValida(ficha.eppsUniformesDetalle)) return false;
      if (!listaKpisValida(ficha.indicadoresKpisDetalle)) return false;
      return CAMPOS_FICHA.every(campo => textoSeguro(ficha[campo]) !== "");
    }

    function badgeEstado(cargo) {
      if (fichaCompleta(cargo)) {
        return '<span class="badge-estado badge-completo">COMPLETO</span>';
      }
      return '<span class="badge-estado badge-incompleto">INCOMPLETO</span>';
    }

    function fuenteCargo(cargo) {
      return textoSeguro(cargo?.justificacionCreacionCargo) ? "Solicitud" : "AS2";
    }

    function abrirEdicion(codigoCargo) {
      const codigo = encodeURIComponent(codigoCargo);
      window.location.href = `editar-manual-funciones.html?codigo=${codigo}`;
    }

    function renderTabla() {
      const tabla = document.getElementById("tablaManuales");
      tabla.innerHTML = "";

      const lista = asegurarData();
      if (!lista.length) {
        tabla.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No existen cargos registrados.</td></tr>';
        return;
      }

      lista.forEach((cargo, index) => {
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${index + 1}</td>
          <td>${cargo.codigoCargo || "-"}</td>
          <td>${cargo.nombreCargo || "-"}</td>
          <td>${cargo.area || "-"}</td>
          <td>${cargo.departamento || "-"}</td>
          <td>${fuenteCargo(cargo)}</td>
          <td>${badgeEstado(cargo)}</td>
          <td>
            <button type="button" class="btn btn-primary btn-sm">Editar</button>
          </td>
        `;

        const btn = fila.querySelector("button");
        btn.addEventListener("click", () => abrirEdicion(cargo.codigoCargo));

        tabla.appendChild(fila);
      });
    }

    document.addEventListener("DOMContentLoaded", renderTabla);
  </script>
  <script src="../../assets/js/ui-shell.js"></script>
</body>
</html>
